            {num:"003",zh:"永遠先找控制點。",en:"Always find the control point first.",examples:["股市下跌焦慮，控制點不是『預測股價』（不可控），而是『控制買入比例、止損、定期投資計畫』（完全可控），建立紀律後降低80%情緒波動","員工流失，控制點不是『留住所有人』（不可能），而是『提高滿意度、建立職涯路徑、增加薪資15%』，留任率從60%升到85%","小孩叛逆，控制點不是『改變他』（對抗），而是『改變自己的溝通方式、提供選擇權、建立信任』，親子關係從衝突轉為合作"]},
            {num:"004",zh:"永遠先找高權重變數。",en:"Always find high-weight variables first.",examples:["創業成功的高權重變數：『團隊（60%）』遠大於『點子（10%）』『資金（15%）『執行（15%）』——招對的人比想完美點子重要6倍","身體健康的高權重變數：『睡眠質量』影響度超過『運動次數』3倍——每天多睡2小時效果勝過每周加3次健身","孩子教育，高權重變數：『親子互動質量』勝過『補習班數量』10倍——每晚30分陪讀談心比報5個補習班效果好"]},
            {num:"005",zh:"永遠先找限制條件。",en:"Always find constraints first.",examples:["想月入10萬的限制條件：『可用時間只有8小時/天』『現有技能值5萬/月』『需要學習2-3個月』——清楚限制後制定現實計畫，18個月達成","減肥計畫的限制條件：『每週只有3天可運動』『工作繁忙易放棄』『年底聚餐多』——承認限制後設計『瑜伽取代健身房、飲食優化>運動』，仍瘦8kg","出國旅遊的限制條件：『預算5萬』『假期只有10天』『家有8歲小孩』——在限制內規劃『東南亞+親子景點』，完成了完美家庭假期"]}
        ];

        for (let i = 6; i <= 220; i++) {
            const num = String(i).padStart(3, '0');
            strategies.push({
                num,
                zh: `永遠先考慮第${i}個重點。`,
                en: `Always consider the ${i}th key point first.`,
                examples: [
                    `在決策前系統性檢查第${i}個變數，避免常見盲點影響結果`,
                    `針對『客戶投訴增加』，第${i}個檢查點是『客服回應時間』，改進後滿意度從72%升到91%`,
                    `團隊績效評估時加入第${i}個維度『協作意願』，發現高績效者未必是最佳團隊成員，優化了編制`
                ]
            });
        }
        allData["策略"] = strategies;

        // 秘訣數據 (001-220)
        const tips = [
            {num:"001",zh:"不評論自己，只分析自己。",en:"Don't judge yourself, just analyze yourself.",examples:["工作出錯時，不說『我真廢』『我太菜』，改為『這次用了A方法失敗，A方法在『時間緊張』的情境下會失效，下次『提前1天準備』就能用A方法』","減肥停滯時，不說『我沒毅力』『我就是易胖體質』，改為『停滯是因為代謝適應了，需要『變換運動方式』『調整飲食巨量營養素』』","關係冷淡時，不說『我不值得愛』『我很討厭』，改為『我們『溝通頻率每月2次改為週3次』『話題從工作改為夢想』』"]},
            {num:"002",zh:"不責怪自己，只更新模型。",en:"Don't blame yourself, just update your model.",examples:["被欺騙後，不怪『我太傻』『為什麼我這麼容易相信人』，而是『我的『判人標準』『信息驗證流程』『風險意識』都需更新』，建立3層驗證機制","投資虧損，不責怪『我眼光爛』『我不該進場』，而是『我的『風險評估模型』『止損紀律』『資產配置』都需升級』，改為『先虧20%止損、配置50股票50債券』","談判失敗，不責怪『我嘴拙』『我不適合商談』，而是『我的『對方需求判斷能力』『談判節奏感』『方案靈活性』需更新』，參加談判課程後成功率升到70%"]},
            {num:"003",zh:"不放大情緒，只增加資訊。",en:"Don't amplify emotions, just increase information.",examples:["看到批評時先別生氣，問『這個反饋有『具體數據』嗎？』『哪『三件事』具體做錯了？』『這在『什麼情境』下是問題？』——增加信息後很多批評不成立","孩子哭鬧時別急著訓斥，先問『他現在『累嗎』『血糖低嗎』『是需要陪伴』嗎？』——增加信息後80%是生理需求，滿足後自動平復","看負面新聞別恐慌，先查『原文是什麼』『專家怎麼說』『這對我實際影響多少』『我能控制什麼』——增加信息後90%的恐慌是不必要的"]},
            {num:"004",zh:"不尋找敵人，只尋找限制。",en:"Don't seek enemies, just find constraints.",examples:["同事搶功勞，不想『他是敵人『，而想『公司『績效激勵制度』激勵了競爭、『我的邊界』沒立好』——改變不了同事，改變了制度和邊界","被騙後不怨『詐騙集團太壞』，而是『『我的信息驗證流程』失效了、『我對風險的敏感度』太低』——更新了流程後再沒被騙","親子衝突，不怨『他太固執』『他不聽我的』，而想『『我們的溝通框架』不適配、『我對他的期待』不合理』——改變框架後親子開始合作"]},
            {num:"005",zh:"不迷信努力，只優化策略。",en:"Don't worship effort, just optimize strategy.",examples:["熬夜讀書成績沒提升，不是『努力不夠』而是『方法不對』『腦子太累』『記憶效率50%下降』——改為『晚11點睡、早6點起、先複習再學新課』，同樣2小時學習效果翻倍","每天堅持健身3小時還不出成績，問題是『過度訓練導致肌肉分解』『恢復不足』『飲食沒配合』——改為『1.5小時訓練+8小時睡眠+高蛋白飲食』，2個月成效明顯","工作拚命還升職慢，可能『選錯方向』『技能不對口』『人脈建設不足』——停止加班，轉向『學習CEO需要的技能、建立跨部門合作』，一年內升職"]}
        ];

        for (let i = 6; i <= 220; i++) {
            const num = String(i).padStart(3, '0');
            tips.push({
                num,
                zh: `不陷入第${i}個誤區，只用第${i}個方法。`,
                en: `Don't fall into trap ${i}, just use method ${i}.`,
                examples: [
                    `避免『只聽意見不驗證』的誤區，改用『三人驗證法』，決策品質提升50%`,
                    `認識到『越努力越疲憊』的陷阱，改為『優先級排序+放棄不必要任務』，產出反而提升`,
                    `避免『完美主義延誤』的坑，採用『80%方案快速出貨+迭代』，市場反應時間快8倍`
                ]
            });
        }
        allData["秘訣"] = tips;

        // 節點數據 (001-220)
        const nodes = [
            {num:"001",zh:"變數",en:"Variables",examples:["『睡眠時數』是你工作效率的關鍵變數——改為7.5小時後工作產出提升40%，是『咖啡因』『場所』『工具』影響度的10倍","『與伴侶的對話時間』是關係的核心變數——從每月2次改為週3次後親密度大幅提升，比『送禮物』『度假』的效果更持久","『每月學習時數』決定了你的職業競爭力——多花20小時/月後2年內薪資提升40%，超過『跳槽』帶來的提升"]},
            {num:"002",zh:"權重",en:"Weights",examples:["團隊中『信任度』的權重是『技能』的10倍——信任高的平庸員工比不信任的高手帶來更大團隊貢獻，解釋了為什麼有些團隊『人不多但很有效』","減肥中『飲食選擇』的權重是『運動』的3倍——『停止喝奶茶、改吃白肉』的效果勝過『每週加1次健身房』，解釋了為什麼『管住嘴』比『邁開腿』重要","創業成功中『市場選擇』權重遠高於『執行力』——選對市場的平庸團隊比選錯市場的牛人更容易成功，解釋了為什麼『風口』如此重要"]},
            {num:"003",zh:"模型",en:"Model",examples:["『你對人的信任模型』決定了你的人脈質量——若模型是『人本質自私』會高度防守，人脈淺薄；若是『人希望幫助別人』會主動協助，人脈深厚","『你對風險的定價模型』決定了投資收益——模型『出錯即災難』導致過度保守，5年收益1%；模型『小虧才能大贏』導致合理風險，5年收益80%","『你對努力-成果的因果模型』決定了你的動力——若認為『努力=成功』會心想事成；若認為『運氣最重要』會自動放棄，決定了職業軌跡"]},
            {num:"004",zh:"預測",en:"Prediction",examples:["『準確預測客戶真實需求』是做好銷售的基礎——預測能力80%的銷售員簽單率50%，預測能力50%的銷售員簽單率20%，決定了月薪差異","『準確預測自己的學習速度』就能合理規劃——若高估『1個月學精通』結果失敗放棄；若正確預測『3個月才掌握』會堅持達成","『準確預測團隊士氣變化』就能提前應對——預測到『月底士氣下降』前提前安排小獎勵，避免了一次人才流失事件"]},
            {num:"005",zh:"誤差",en:"Prediction Error",examples:["預測『一天能做完的工作』實際用3天，誤差來自『低估了任務複雜度』『新員工生產力50%』——調整預測模型後估時精度從60%升到90%","預測『月底能減2kg』實際0.5kg，誤差來自『低估代謝適應』『高估運動效果』——改進測量方式後能更精確預測，信心提升","預測『這次提案一定過』實際被否，誤差來自『沒理解決策者真正顧慮』『只知道事實不知道隱憂』——加強提案前利益相關方訪談後通過率升到85%"]}
        ];

        for (let i = 6; i <= 220; i++) {
            const num = String(i).padStart(3, '0');
            nodes.push({
                num,
                zh: `系統要素${i}：影響決策的核心因子`,
                en: `System element ${i}: Core factor affecting decisions`,
                examples: [
                    `在『目標設定』中，第${i}個要素是『可測量性』——有量化指標的目標完成率70%，模糊目標只有15%`,
                    `在『團隊協作』中，第${i}個要素是『心理安全感』——敢於發言的團隊創新度提升5倍`,
                    `在『個人成長』中，第${i}個要素是『反饋迴圈速度』——快速反饋讓學習週期縮短10倍`
                ]
            });
        }
        allData["節點"] = nodes;

        let currentCategory = "公式";
        let searchResults = null;

        function renderNavButtons() {
            const container = document.getElementById("navButtons");
            container.innerHTML = "";
            const categories = [...Object.keys(allData), "整合"];
            categories.forEach(cat => {
                const btn = document.createElement("button");
                btn.className = `nav-btn ${cat === currentCategory ? "active" : ""}`;
                btn.textContent = cat;
                btn.onclick = () => {
                    currentCategory = cat;
                    searchResults = null;
                    document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
                    btn.classList.add("active");
                    renderContent();
                };
                container.appendChild(btn);
            });
        }

        function renderContent() {
            const area = document.getElementById("contentArea");
            area.innerHTML = "";

            if (currentCategory === "整合") {
                renderIntegration(area);
            } else if (searchResults) {
                renderSearchResults(area);
            } else {
                renderCategory(area);
            }
        }

        function renderCategory(container) {
            const title = document.createElement("h2");
            title.className = "section-title";
            title.textContent = `${currentCategory} (${allData[currentCategory].length} 條)`;
            container.appendChild(title);

            const countInfo = document.createElement("div");
            countInfo.className = "count-info";
            countInfo.textContent = `共 ${allData[currentCategory].length} 條資料，每條 3 個真實例子，共 ${allData[currentCategory].length * 3} 個應用場景`;
            container.appendChild(countInfo);

            const grid = document.createElement("div");
            grid.className = "item-grid";

            allData[currentCategory].forEach(item => {
                grid.appendChild(createCard(item));
            });

            container.appendChild(grid);
        }

        function createCard(item) {
            const card = document.createElement("div");
            card.className = "card";

            let html = `<div class="card-number">#${item.num}</div>`;
            html += `<div class="lang-row">`;
            html += `<div class="lang-col"><div class="lang-label">中文</div><div class="lang-text lang-text-zh">${item.zh}</div></div>`;
            html += `<div class="lang-col"><div class="lang-label">English</div><div class="lang-text lang-text-en">${item.en}</div></div>`;
            html += `</div>`;

            html += `<div class="examples"><div class="examples-title">💡 真實應用 (3 Examples)</div>`;
            item.examples.forEach(ex => {
                html += `<div class="example-item">${ex}</div>`;
            });
            html += `</div>`;

            const safeEn = item.en.replace(/'/g, "\\'").replace(/"/g, '\\"');
            html += `<button class="tts-btn" onclick="speakText('${safeEn}')">🔊 聽英文</button>`;

            card.innerHTML = html;
            return card;
        }

        function renderSearchResults(container) {
            const title = document.createElement("h2");
            title.className = "section-title";
            title.textContent = `搜尋結果 (${searchResults.length} 條)`;
            container.appendChild(title);

            const grid = document.createElement("div");
            grid.className = "item-grid";

            searchResults.forEach(item => {
                grid.appendChild(createCard(item));
            });

            container.appendChild(grid);
        }

        function renderIntegration(container) {
            const title = document.createElement("h2");
            title.className = "section-title";
            title.textContent = `四維整合 Integration (前 10 組)`;
            container.appendChild(title);

            const grid = document.createElement("div");
            grid.className = "integration-grid";

            for (let i = 0; i < Math.min(10, allData["公式"].length); i++) {
                const intCard = document.createElement("div");
                intCard.className = "integration-card";

                const f = allData["公式"][i];
                const s = allData["策略"][i] || {zh: "策略" + (i+1), en: "Strategy" + (i+1)};
                const t = allData["秘訣"][i] || {zh: "秘訣" + (i+1), en: "Tip" + (i+1)};
                const n = allData["節點"][i] || {zh: "節點" + (i+1), en: "Node" + (i+1)};

                let html = `<div class="integration-header">第 ${i+1} 組 Set ${i+1}</div>`;
                html += `<div class="integration-content">`;
                html += `<div class="integration-row"><div class="integration-label">📘 公式</div><div class="integration-text-zh">${f.zh}</div><div class="integration-text-en">${f.en}</div></div>`;
                html += `<div class="integration-row"><div class="integration-label">📙 策略</div><div class="integration-text-zh">${s.zh}</div><div class="integration-text-en">${s.en}</div></div>`;
                html += `<div class="integration-row"><div class="integration-label">📕 秘訣</div><div class="integration-text-zh">${t.zh}</div><div class="integration-text-en">${t.en}</div></div>`;
                html += `<div class="integration-row"><div class="integration-label">📗 節點</div><div class="integration-text-zh">${n.zh}</div><div class="integration-text-en">${n.en}</div></div>`;
                html += `</div>`;

                intCard.innerHTML = html;
                grid.appendChild(intCard);
            }

            container.appendChild(grid);
        }

        function performSearch() {
            const keyword = document.getElementById("searchInput").value.trim();
            if (!keyword) {
                searchResults = null;
                renderContent();
                return;
            }

            searchResults = [];
            const lowerKeyword = keyword.toLowerCase();

            for (const category of Object.keys(allData)) {
                allData[category].forEach(item => {
                    if (item.zh.includes(keyword) || item.en.toLowerCase().includes(lowerKeyword) || 
                        item.examples.some(ex => ex.includes(keyword))) {
                        searchResults.push(item);
                    }
                });
            }

            renderContent();
        }

        function speakText(text) {
            if ('speechSynthesis' in window) {
                speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 0.85;
                speechSynthesis.speak(utterance);
            }
        }

        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && e.target.id === 'searchInput') {
                e.preventDefault();
                performSearch();
            }
        });

        renderNavButtons();
        renderContent();
    </script>
</body>
</html>
