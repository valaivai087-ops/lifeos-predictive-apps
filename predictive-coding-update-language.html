<html lang="zh-TW">
<head>
    <meta charset="UTF-8">

    <title>預測編碼更新語言 | Predictive Coding Update Language</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #FFFFFF;
            font-family: 'Microsoft JhengHei', 'Segoe UI', Tahoma, sans-serif;
            color: #0D1B3E;
            line-height: 1.8;
            padding: 30px 15px;
        }
        
        .container {
            max-width: 1600px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 4px solid #C9960C;
            padding-bottom: 25px;
        }
        
        h1 {
            font-size: 44px;
            font-weight: bold;
            color: #0D1B3E;
            margin-bottom: 8px;
        }
        
        .subtitle {
            font-size: 20px;
            color: #006B7D;
            font-weight: 500;
        }
        
        .controls {
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
        }
        
        input[type="text"] {
            width: 100%;
            max-width: 400px;
            padding: 12px 16px;
            font-size: 16px;
            border: 2px solid #006B7D;
            border-radius: 4px;
            font-family: 'Microsoft JhengHei', sans-serif;
            color: #0D1B3E;
        }
        
        input[type="text"]:focus {
            outline: none;
            border-color: #C9960C;
            box-shadow: 0 0 0 3px rgba(201, 150, 12, 0.15);
        }
        
        .cards-grid {
            display: grid;
            gap: 25px;
            margin-bottom: 40px;
        }
        
        .card {
            border: 2px solid #E0E0E0;
            border-left: 6px solid #006B7D;
            background: #FFFFFF;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 2px;
            overflow: hidden;
        }
        
        .card:hover {
            border-left-color: #C9960C;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08);
        }
        
        .card-header {
            padding: 18px 20px;
            background: #F5F5F5;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #E0E0E0;
        }
        
        .card-num {
            font-size: 24px;
            font-weight: bold;
            color: #C9960C;
            min-width: 65px;
        }
        
        .card-title {
            flex: 1;
            margin: 0 20px;
            font-size: 16px;
            font-weight: 500;
            color: #0D1B3E;
        }
        
        .toggle-icon {
            font-size: 24px;
            color: #006B7D;
            transition: transform 0.3s ease;
            min-width: 30px;
        }
        
        .card.expanded .toggle-icon {
            transform: rotate(180deg);
        }
        
        .card-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        
        .card.expanded .card-content {
            max-height: 3000px;
        }
        
        .content-wrapper {
            padding: 25px;
        }
        
        .section {
            margin-bottom: 30px;
            padding-bottom: 30px;
            border-bottom: 1px solid #E8E8E8;
        }
        
        .section:last-child {
            margin-bottom: 0;
            border-bottom: none;
        }
        
        .section-title {
            font-size: 14px;
            font-weight: bold;
            color: #C9960C;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #C9960C;
        }
        
        .bilingual-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        
        .lang-side {
            display: flex;
            flex-direction: column;
        }
        
        .text-content {
            font-size: 16px;
            line-height: 1.75;
            color: #2C2C2C;
        }
        
        .tts-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            background: #006B7D;
            color: #FFFFFF;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 13px;
            font-family: 'Microsoft JhengHei', sans-serif;
            margin-top: 12px;
            width: fit-content;
            transition: all 0.3s ease;
        }
        
        .tts-btn:hover {
            background: #0A7A72;
        }
        
        .stats {
            text-align: center;
            padding: 30px;
            background: #F5F5F5;
            border-radius: 4px;
            color: #006B7D;
            font-size: 16px;
            font-weight: 500;
        }
        
        @media (max-width: 1024px) {
            .bilingual-content {
                grid-template-columns: 1fr;
                gap: 20px;
            }
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 32px;
            }
            
            .content-wrapper {
                padding: 18px;
            }
            
            .section {
                margin-bottom: 25px;
                padding-bottom: 25px;
            }
        }
    </style>
</head>

            {n: 10, cn_old: '命運決定人生。', en_old: 'Destiny determines life.', cn_new: '更新決定人生。', en_new: 'Updating determines life.', cn_essence: '人生來自每天累積的小更新。', en_essence: 'Life comes from small daily updates accumulated over time.', cn_effect: '增加行動力。提升責任感。建立長期成長。', en_effect: 'Increase agency. Improve responsibility. Build long-term growth.', cn_meaning: '每天更新一點。命運就開始改變。', en_meaning: 'Update a little each day. Destiny begins to change.'},
            {n: 20, cn_old: '壓力越少越幸福。', en_old: 'Less pressure means more happiness.', cn_new: '適度壓力促進更新。', en_new: 'Moderate pressure promotes updating.', cn_essence: '完全沒有挑戰。模型容易停滯。', en_essence: 'No challenge means the model easily stagnates.', cn_effect: '提升學習效率。增加生命活力。促進能力成長。', en_effect: 'Improve learning efficiency. Increase vitality. Promote ability growth.', cn_meaning: '幸福不是沒有壓力。而是有能力面對壓力。', en_meaning: 'Happiness is not no pressure. It is having ability to face pressure.'},
            {n: 50, cn_old: '輸了就是輸了。', en_old: 'Loss means loss.', cn_new: '輸了得到新資料。', en_new: 'Loss provides new data.', cn_essence: '輸贏只是一次驗證。真正留下的是資料。', en_essence: 'Win or loss is just one validation. What remains is data.', cn_effect: '提升恢復力。增加修正速度。降低失敗恐懼。', en_effect: 'Improve recovery. Increase correction speed. Reduce fear of failure.', cn_meaning: '只要願意分析。每一次失敗都是資產。', en_meaning: 'If willing to analyze, every failure is an asset.'},
            {n: 60, cn_old: '人生追求完美。', en_old: 'Life pursues perfection.', cn_new: '人生追求持續降低預測誤差、提高解決問題能力。', en_new: 'Life pursues continuous reduction of prediction error and improvement in problem-solving.', cn_essence: '人生不是追求零錯誤。而是不斷接近真實。', en_essence: 'Life is not pursuing zero errors. It is constantly approaching reality.', cn_effect: '提升韌性。增加幸福感。建立終身成長系統。', en_effect: 'Improve resilience. Increase happiness. Build lifelong growth system.', cn_meaning: '真正成功的人生。不是永遠完美。而是每天都比昨天更理解世界、更理解自己。', en_meaning: 'A truly successful life is not always perfect. It is understanding the world and oneself better each day than yesterday.'},
            {n: 100, cn_old: '犯錯要避免。', en_old: 'Mistakes must be avoided.', cn_new: '重複犯同樣錯才要避免。', en_new: 'Only repeating the same mistake must be avoided.', cn_essence: '第一次錯誤是學習。重複錯誤是忽略回饋。', en_essence: 'First mistake is learning. Repeated mistake is ignoring feedback.', cn_effect: '提升反思能力。增加修正品質。降低重複失敗。', en_effect: 'Improve reflection. Increase correction quality. Reduce repeated failure.', cn_meaning: '智慧不是從不犯錯。而是每一次錯誤。都讓下一次的自己更接近真實。', en_meaning: 'Wisdom is not never making mistakes. It is each mistake bringing the next self closer to reality.'},
            {n: 120, cn_old: '看見人生。', en_old: 'See life.', cn_new: '看見持續更新的生成系統。', en_new: 'See a system that continuously updates and generates.', cn_essence: '人生不是固定劇本。而是不斷修正與生成。', en_essence: 'Life is not a fixed script. It is constant correction and generation.', cn_effect: '增加希望。提升適應力。建立終身學習。', en_effect: 'Increase hope. Improve adaptability. Build lifelong learning.', cn_meaning: '真正的人生智慧。不是一次找到答案。而是一生持續更新自己的世界模型。', en_meaning: 'True life wisdom is not finding the answer once. It is continuously updating your world model for life.'},

            {n: 160, cn_old: '看見未來。', en_old: 'See the future.', cn_new: '看見持續生成的可能性。', en_new: 'See continuously generating possibilities.', cn_essence: '未來不是等待發生。而是每天生成。', en_essence: 'Future is not waiting to happen. It is generated every day.', cn_effect: '增加希望。提升規劃能力。建立長期思維。', en_effect: 'Increase hope. Improve planning ability. Build long-term thinking.', cn_meaning: '最好的預測未來方式。就是今天開始創造未來。', en_meaning: 'The best way to predict the future is to create it starting today.'},
            {n: 180, cn_old: '看見人類。', en_old: 'See humanity.', cn_new: '看見能持續預測、修正、學習、合作、創造的智慧生成系統。', en_new: 'See a wisdom-generating system that continuously predicts, corrects, learns, cooperates, and creates.', cn_essence: '人類最大的能力。不是記憶。不是力量。而是持續更新世界模型。', en_essence: 'Humanity\'s greatest ability is not memory or strength. It is continuously updating world models.', cn_effect: '提升終身學習能力。增加創新能力。建立高維思考。', en_effect: 'Improve lifelong learning. Increase innovation ability. Build high-dimensional thinking.', cn_meaning: '人類文明之所以能持續進步。不是因為從未犯錯。而是因為願意不斷修正、持續更新，讓每一代都比上一代更接近真實。', en_meaning: 'Human civilization progresses not because we never make mistakes. It is because we are willing to continuously correct and update, letting each generation approach reality better than the last.'},
            {n: 200, cn_old: '看見生命。', en_old: 'See life.', cn_new: '看見一個持續預測、持續修正、持續恢復、持續適應、持續演化的自我更新系統。', en_new: 'See a self-updating system that continuously predicts, corrects, recovers, adapts, and evolves.', cn_essence: '生命最大的能力。不是避免改變。而是不斷適應改變。', en_essence: 'Life\'s greatest ability is not avoiding change. It is continuously adapting to change.', cn_effect: '建立整體健康觀。提升終身學習能力。增加面對未知的信心。', en_effect: 'Build holistic health view. Improve lifelong learning ability. Increase confidence in facing unknown.', cn_meaning: '生命真正的奇蹟。不是永遠正確。而是在每一次誤差、每一次挑戰、每一次修正之後，持續演化成更成熟、更有智慧的自己。', en_meaning: 'Life\'s true miracle is not being always correct. It is evolving into a wiser self after each error, challenge, and correction.'},

            {n: 240, cn_old: '看見理解。', en_old: 'See understanding.', cn_new: '看見世界模型持續生成。', en_new: 'See world models continuously generating.', cn_essence: '理解不是記住答案。而是能持續生成新的答案。', en_essence: 'Understanding is not remembering answers. It is continuously generating new answers.', cn_effect: '提升終身學習。增加創造能力。建立高維思考。', en_effect: 'Improve lifelong learning. Increase creative ability. Build high-dimensional thinking.', cn_meaning: '當一個人真正理解世界。他不再害怕未知。因為他知道，任何未知都能透過觀察、預測、修正與學習，逐漸轉化成新的理解。', en_meaning: 'When someone truly understands the world, they no longer fear the unknown. Because they know any unknown can gradually transform into new understanding through observation, prediction, correction, and learning.'},

        let allCards = [...fullData];
        let currentSearch = '';

        function renderCards() {
            const grid = document.getElementById('cardsGrid');
            grid.innerHTML = '';
            
            let filtered = allCards;
            if (currentSearch) {
                filtered = allCards.filter(item => 
                    item.cn_old.includes(currentSearch) || 
                    item.en_old.includes(currentSearch) ||
                    item.cn_new.includes(currentSearch) ||
                    item.en_new.includes(currentSearch)
                );
            }

            filtered.forEach(item => {
                const card = createCard(item);
                grid.appendChild(card);
            });
        }

        function createCard(item) {
            const card = document.createElement('div');
            card.className = 'card';
            
            card.innerHTML = `
                <div class="card-header">
                    <div class="card-num">#${String(item.n).padStart(3, '0')}</div>
                    <div class="card-title">${item.cn_old}</div>
                    <div class="toggle-icon">▼</div>
                </div>
                <div class="card-content">
                    <div class="content-wrapper">
                        <!-- Old -->
                        <div class="section">
                            <div class="section-title">舊預測 | Old</div>
                            <div class="bilingual-content">
                                <div class="lang-side">
                                    <div class="text-content">${item.cn_old}</div>
                                </div>
                                <div class="lang-side">
                                    <div class="text-content">${item.en_old}</div>
                                    <button class="tts-btn" onclick="speakText('${item.en_old.replace(/'/g, "\\'")}')">🔊 Listen</button>
                                </div>
                            </div>
                        </div>
                        
                        <!-- New -->
                        <div class="section">
                            <div class="section-title">新預測 | New</div>
                            <div class="bilingual-content">
                                <div class="lang-side">
                                    <div class="text-content">${item.cn_new}</div>
                                </div>
                                <div class="lang-side">
                                    <div class="text-content">${item.en_new}</div>
                                    <button class="tts-btn" onclick="speakText('${item.en_new.replace(/'/g, "\\'")}')">🔊 Listen</button>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Essence -->
                        <div class="section">
                            <div class="section-title">本質 | Essence</div>
                            <div class="bilingual-content">
                                <div class="lang-side">
                                    <div class="text-content">${item.cn_essence}</div>
                                </div>
                                <div class="lang-side">
                                    <div class="text-content">${item.en_essence}</div>
                                    <button class="tts-btn" onclick="speakText('${item.en_essence.replace(/'/g, "\\'")}')">🔊 Listen</button>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Effects -->
                        <div class="section">
                            <div class="section-title">功效 | Effects</div>
                            <div class="bilingual-content">
                                <div class="lang-side">
                                    <div class="text-content">${item.cn_effect}</div>
                                </div>
                                <div class="lang-side">
                                    <div class="text-content">${item.en_effect}</div>
                                    <button class="tts-btn" onclick="speakText('${item.en_effect.replace(/'/g, "\\'")}')">🔊 Listen</button>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Meaning -->
                        <div class="section">
                            <div class="section-title">意義 | Meaning</div>
                            <div class="bilingual-content">
                                <div class="lang-side">
                                    <div class="text-content">${item.cn_meaning}</div>
                                </div>
                                <div class="lang-side">
                                    <div class="text-content">${item.en_meaning}</div>
                                    <button class="tts-btn" onclick="speakText('${item.en_meaning.replace(/'/g, "\\'")}')">🔊 Listen</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            card.querySelector('.card-header').addEventListener('click', () => {
                card.classList.toggle('expanded');
            });
            
            return card;
        }

        function speakText(text) {
            if ('speechSynthesis' in window) {
                speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 0.85;
                utterance.pitch = 1;
                speechSynthesis.speak(utterance);
            }
        }

        function updateStats() {
            let total = allCards.length;
            let showing = currentSearch ? 
                allCards.filter(item => 
                    item.cn_old.includes(currentSearch) || 
                    item.en_old.includes(currentSearch) ||
                    item.cn_new.includes(currentSearch) ||
                    item.en_new.includes(currentSearch)
                ).length : total;
            
            document.getElementById('statsText').textContent = 
                `顯示 ${showing} / 總計 ${total} 條目  |  Showing ${showing} / Total ${total} entries`;
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            currentSearch = e.target.value.trim();
            renderCards();
            updateStats();
        });

        // Initialize
        renderCards();
        updateStats();
    </script>
</body>
</html>
