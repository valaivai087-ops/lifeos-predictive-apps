<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>克漏字開外掛｜學測克漏字診斷系統</title>
<style>
/* ===================== Cloze Diagnostic App — Styles ===================== */

:root {
  --ink: #1f2430;
  --ink-soft: #4a5266;
  --paper: #fbf9f4;
  --paper-raised: #ffffff;
  --line: #e3ddd0;
  --accent: #b5541f;
  --accent-soft: #f0dcc9;
  --accent-deep: #7a3713;
  --good: #2f7d4f;
  --good-bg: #e7f3ea;
  --bad: #b3402f;
  --bad-bg: #fbe9e5;
  --gold: #a98330;
  --gold-light: #d8b98a;
  --serif: 'Noto Serif TC', 'Source Han Serif TC', Georgia, 'Times New Roman', serif;
  --sans: 'Noto Sans TC', 'Source Han Sans TC', -apple-system, 'Segoe UI', sans-serif;
  --mono: 'Source Han Sans TC', ui-monospace, Menlo, Consolas, monospace;
  --shadow: 0 1px 3px rgba(40, 30, 15, 0.05);
  --shadow-lg: 0 12px 32px rgba(90, 55, 20, 0.18);
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--paper);
  color: var(--ink);
  font-family: var(--sans);
  font-size: 17px;
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
}

#app { min-height: 100vh; }
button { font-family: inherit; cursor: pointer; }
::selection { background: var(--accent-soft); }

/* ---------- XP top bar (gamification layer) ---------- */
.xp-topbar {
  position: sticky; top: 0; z-index: 60;
  background: linear-gradient(135deg, #2a2118 0%, #3c2c1a 100%);
  color: #f4ead8;
  padding: 10px 20px;
}
.xp-topbar-inner {
  max-width: 1400px; margin: 0 auto;
  display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
}
.xp-brand { font-family: var(--serif); font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.xp-stats { display: flex; align-items: center; gap: 10px; margin-left: auto; flex-wrap: wrap; }
.xp-pill {
  display: flex; align-items: center; gap: 5px;
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.18);
  border-radius: 999px; padding: 4px 12px; font-size: 13px; font-weight: 600;
}
.xp-lv-badge { background: var(--gold); color: #2a2118; font-weight: 800; border-radius: 999px; padding: 4px 12px; font-size: 13px; }
.xp-bar-track { width: 100%; height: 5px; background: rgba(255,255,255,0.15); border-radius: 999px; margin-top: 8px; overflow: hidden; }
.xp-bar-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold-light)); border-radius: 999px; transition: width .4s; }
.xp-nav-tabs { display: flex; gap: 4px; }
.xp-nav-tab {
  background: none; border: 1px solid rgba(255,255,255,0.2); color: #e3d2b6;
  border-radius: 999px; padding: 5px 13px; font-size: 13px; font-weight: 600;
}
.xp-nav-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

/* ---------- Home / hero ---------- */

.top-hero {
  background: linear-gradient(160deg, #2a2118 0%, #3c2c1a 55%, #4a3220 100%);
  color: #f4ead8;
  padding: 56px 24px 64px;
  position: relative;
  overflow: hidden;
}
.top-hero::after {
  content: '';
  position: absolute; right: -80px; top: -80px;
  width: 320px; height: 320px; border-radius: 50%;
  background: radial-gradient(circle, rgba(185, 130, 60, 0.35), transparent 70%);
}
.hero-inner { max-width: 920px; margin: 0 auto; position: relative; z-index: 1; }
.hero-eyebrow {
  font-family: var(--mono); letter-spacing: 0.12em; text-transform: uppercase;
  font-size: 13px; color: var(--gold); margin: 0 0 14px;
}
.hero-title {
  font-family: var(--serif); font-size: clamp(32px, 6vw, 52px); font-weight: 700;
  margin: 0 0 18px; line-height: 1.15;
}
.hero-title-sub { font-size: 0.5em; font-weight: 400; color: #d8b98a; display: inline-block; margin-left: 6px; vertical-align: middle; }
.hero-desc { font-size: 16px; color: #e3d2b6; max-width: 640px; margin: 0; }

.home-main { max-width: 1080px; margin: 0 auto; padding: 40px 24px 80px; }

.category-block { margin-bottom: 44px; }
.category-title {
  font-family: var(--serif); font-size: 23px; font-weight: 700;
  margin: 0 0 18px; display: flex; align-items: baseline; gap: 10px;
  padding-bottom: 10px; border-bottom: 2px solid var(--line);
}
.category-title-zh { font-family: var(--sans); font-weight: 400; font-size: 15px; color: var(--ink-soft); }

.unit-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 14px; }

.unit-card {
  background: var(--paper-raised); border: 1.5px solid var(--line); border-radius: 14px;
  padding: 18px 16px; text-align: left; display: flex; flex-direction: column; gap: 6px;
  transition: border-color 0.15s, transform 0.1s, box-shadow 0.15s; box-shadow: var(--shadow);
}
.unit-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 6px 16px rgba(120, 70, 20, 0.12); }
.unit-card-num { font-family: var(--serif); font-size: 26px; font-weight: 700; color: var(--accent-deep); }
.unit-card-title { font-size: 13.5px; color: var(--ink-soft); }
.unit-card-progress {
  margin-top: 4px; font-family: var(--mono); font-size: 12.5px; font-weight: 700; color: var(--good);
  background: var(--good-bg); border-radius: 6px; padding: 3px 8px; display: inline-block; width: fit-content;
}
.unit-card-progress-empty { color: var(--ink-soft); background: #efebe2; font-weight: 400; }

/* ---------- Unit view header ---------- */

.unit-header {
  display: flex; align-items: center; flex-wrap: wrap; gap: 16px;
  padding: 18px 24px; background: var(--paper-raised); border-bottom: 2px solid var(--line);
  position: sticky; top: 53px; z-index: 50;
}
.back-btn { background: none; border: 1.5px solid var(--line); border-radius: 999px; padding: 7px 15px; font-size: 13.5px; color: var(--ink-soft); }
.back-btn:hover { border-color: var(--accent); color: var(--accent-deep); }
.unit-header-title { display: flex; flex-direction: column; margin-right: auto; }
.unit-header-num { font-family: var(--serif); font-size: 20px; font-weight: 700; }
.unit-header-cat { font-size: 12.5px; color: var(--ink-soft); }
.unit-nav-btns { display: flex; gap: 8px; }

.section-tabs {
  display: flex; gap: 6px; padding: 12px 24px; background: var(--paper);
  border-bottom: 1px solid var(--line); overflow-x: auto;
  position: sticky; top: 119px; z-index: 49;
}
.section-tab { background: none; border: none; border-radius: 999px; padding: 8px 16px; font-size: 14px; font-weight: 600; color: var(--ink-soft); white-space: nowrap; }
.section-tab:hover { background: var(--accent-soft); color: var(--accent-deep); }
.section-tab-active { background: var(--accent); color: #fff; }
.section-tab-active:hover { background: var(--accent); color: #fff; }

.unit-main { max-width: 1400px; margin: 0 auto; padding: 28px 24px 100px; }

.passage-group { margin-bottom: 48px; }
.passage-group-title { font-family: var(--serif); font-size: 18px; font-weight: 700; color: var(--accent-deep); margin: 0 0 14px; }

.passage-group-columns { display: grid; grid-template-columns: minmax(0, 1.1fr) minmax(0, 0.9fr); gap: 20px; align-items: start; }
.passage-col { position: sticky; top: 207px; max-height: calc(100vh - 227px); overflow-y: auto; }
.questions-col { max-height: calc(100vh - 227px); overflow-y: auto; padding-right: 4px; }

@media (max-width: 980px) {
  .passage-group-columns { grid-template-columns: 1fr; }
  .passage-col { position: static; max-height: none; overflow-y: visible; }
  .questions-col { max-height: none; overflow-y: visible; }
}

/* ---------- Passage card ---------- */

.passage-card { background: var(--paper-raised); border: 1.5px solid var(--line); border-radius: 16px; padding: 26px 28px; margin-bottom: 22px; box-shadow: var(--shadow); }
.passage-text { font-family: var(--serif); font-size: 17.5px; line-height: 1.85; color: var(--ink); }
.passage-text p { margin: 0 0 1em; }
.passage-text p:last-child { margin-bottom: 0; }

.blank-widget {
  display: inline-block; min-width: 2.6em; text-align: center; font-family: var(--mono);
  font-weight: 700; font-size: 0.85em; border-radius: 5px; padding: 1px 6px; margin: 0 2px; vertical-align: middle;
}
.blank-empty { background: #efe7d6; border-bottom: 2.5px solid var(--gold); }
.blank-correct { background: var(--good-bg); color: var(--good); border-bottom: 2.5px solid var(--good); }
.blank-wrong { background: var(--bad-bg); color: var(--bad); border-bottom: 2.5px solid var(--bad); }

/* ---------- Sentence structure analysis ---------- */

:root {
  --role-S: #1d6fa5; --role-S-bg: #e3f0f9;
  --role-V: #a88200; --role-V-bg: #fff4cc;
  --role-O: #4a8c3f; --role-O-bg: #e9f4e6;
  --role-C: #8a5fc2; --role-C-bg: #f1e9fa;
  --role-M: #8a8478; --role-M-bg: #f0ede6;
  --role-CONJ: #c2792f; --role-CONJ-bg: #faf0e3;
  --role-REL: #d11f1f; --role-REL-bg: #fce3e3;
}

.structure-toggle-row { margin-bottom: 6px; display: flex; justify-content: flex-end; gap: 8px; flex-wrap: wrap; }
.structure-toggle-btn, .translation-toggle-btn {
  background: none; border: 1.5px solid var(--line); border-radius: 999px; padding: 5px 14px;
  font-size: 12.5px; font-weight: 600; color: var(--ink-soft); white-space: nowrap;
}
.structure-toggle-btn:hover, .translation-toggle-btn:hover { border-color: var(--accent); color: var(--accent-deep); }
.structure-toggle-btn-active, .translation-toggle-btn-active { background: var(--accent); color: #fff; border-color: var(--accent); }
.structure-toggle-btn-active:hover, .translation-toggle-btn-active:hover { color: #fff; }
.translation-toggle-btn-active { background: var(--good); border-color: var(--good); }

.speak-btn-inline {
  display: inline-block; background: none; border: none; font-size: 0.85em; padding: 4px 5px;
  margin-left: 1px; cursor: pointer; opacity: 0.5; vertical-align: middle; line-height: 1;
}
.speak-btn-inline:hover { opacity: 1; }
.speak-btn-active { opacity: 1; animation: speak-pulse 0.6s ease-in-out infinite; }
@keyframes speak-pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.25); } }

.sentence-translation {
  display: block; font-family: var(--sans); font-size: 14.5px; color: var(--good);
  background: var(--good-bg); border-radius: 6px; padding: 4px 10px; margin: 2px 0 8px; line-height: 1.6;
}

.gram-chunk { border-radius: 4px; padding: 0.05em 0; cursor: default; }
.gram-S { color: var(--role-S); background: var(--role-S-bg); }
.gram-V { color: var(--role-V); background: var(--role-V-bg); font-weight: 600; }
.gram-O { color: var(--role-O); background: var(--role-O-bg); }
.gram-C { color: var(--role-C); background: var(--role-C-bg); }
.gram-M { color: var(--role-M); }
.gram-CONJ { color: var(--role-CONJ); background: var(--role-CONJ-bg); font-style: italic; }
.gram-REL { color: var(--role-REL); background: var(--role-REL-bg); font-style: italic; }
.gram-TOPIC { color: inherit; }

.grammar-legend-bar {
  display: flex; flex-wrap: wrap; gap: 6px;
  margin-bottom: 16px; padding-bottom: 14px;
  border-bottom: 1px dashed var(--line);
}
.glb-item {
  font-family: var(--mono); font-size: 12px; font-weight: 700;
  padding: 3px 10px; border-radius: 999px; white-space: nowrap;
}
.glb-S { background: var(--role-S-bg); color: var(--role-S); }
.glb-V { background: var(--role-V-bg); color: var(--role-V); }
.glb-O { background: var(--role-O-bg); color: var(--role-O); }
.glb-C { background: var(--role-C-bg); color: var(--role-C); }
.glb-M { background: var(--role-M-bg); color: var(--role-M); }
.glb-CONJ { background: var(--role-CONJ-bg); color: var(--role-CONJ); }
.glb-REL { background: var(--role-REL-bg); color: var(--role-REL); }
.gram-legend { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0 16px; font-size: 12.5px; }
.gram-legend-item { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 999px; }
.gram-legend-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }

.sentence-block { margin-bottom: 2px; }
.tree-toggle-inline {
  display: inline-block; background: none; border: none; font-size: 0.85em; padding: 4px 5px;
  margin-left: 1px; cursor: pointer; opacity: 0.5; vertical-align: middle; line-height: 1;
}
.tree-toggle-inline:hover { opacity: 1; }
.sentence-tree-wrap { margin: 6px 0 16px; padding: 14px 16px; background: #f8f5ee; border: 1px dashed var(--line); border-radius: 10px; overflow-x: auto; }
.tree-row { display: flex; flex-wrap: wrap; align-items: flex-start; gap: 10px; }
.tree-node { display: flex; flex-direction: column; align-items: center; min-width: 60px; }
.tree-node-text { font-family: var(--serif); font-size: 15px; line-height: 1.4; text-align: center; padding: 6px 10px; border-radius: 8px; max-width: 220px; }
.tree-node-role { margin-top: 4px; font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: 0.04em; padding: 1px 7px; border-radius: 999px; color: #fff; }
.tree-node-role-S { background: var(--role-S); }
.tree-node-role-V { background: var(--role-V); }
.tree-node-role-O { background: var(--role-O); }
.tree-node-role-C { background: var(--role-C); }
.tree-node-role-M { background: var(--role-M); }
.tree-node-role-CONJ { background: var(--role-CONJ); }
.tree-node-role-REL { background: var(--role-REL); }
.tree-node-text-S { background: var(--role-S-bg); color: var(--role-S); }
.tree-node-text-V { background: var(--role-V-bg); color: var(--role-V); font-weight: 700; }
.tree-node-text-O { background: var(--role-O-bg); color: var(--role-O); }
.tree-node-text-C { background: var(--role-C-bg); color: var(--role-C); }
.tree-node-text-M { background: var(--role-M-bg); color: var(--role-M); }
.tree-node-text-CONJ { background: var(--role-CONJ-bg); color: var(--role-CONJ); }
.tree-node-text-REL { background: var(--role-REL-bg); color: var(--role-REL); }
.tree-node-text-TOPIC { background: #ece8de; color: var(--ink-soft); }

.word-bank, .ps-options-list { margin-top: 22px; padding-top: 20px; border-top: 1px dashed var(--line); }
.word-bank-label { font-size: 13px; font-weight: 700; letter-spacing: 0.05em; color: var(--ink-soft); text-transform: uppercase; margin: 0 0 12px; }
.word-bank-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; }
.bank-item { font-size: 14.5px; padding: 7px 10px; border-radius: 8px; background: #f4efe3; border: 1px solid var(--line); }
.bank-item strong { color: var(--accent-deep); margin-right: 4px; }
.bank-item-used { opacity: 0.45; text-decoration: line-through; }
.ps-option-item { font-size: 15px; padding: 8px 0; border-bottom: 1px dotted var(--line); }
.ps-option-item:last-child { border-bottom: none; }
.ps-option-item strong { color: var(--accent-deep); margin-right: 8px; }
.ps-option-used { opacity: 0.5; }

.translation-details, .vocab-details { margin-top: 18px; }
.translation-details summary, .vocab-details summary {
  cursor: pointer; font-size: 14px; font-weight: 700; color: var(--accent-deep); padding: 8px 0; list-style: none;
}
.translation-details summary::-webkit-details-marker, .vocab-details summary::-webkit-details-marker { display: none; }
.translation-details summary::before, .vocab-details summary::before { content: '▸ '; font-size: 11px; }
.translation-details[open] summary::before, .vocab-details[open] summary::before { content: '▾ '; }
.translation-text { font-size: 15px; color: var(--ink-soft); background: #f4efe3; border-radius: 10px; padding: 16px 18px; margin: 8px 0 0; line-height: 1.8; }
.vocab-list { margin: 8px 0 0; padding-left: 0; list-style: none; display: grid; gap: 6px; }
.vocab-list li { font-size: 14px; color: var(--ink-soft); padding: 6px 12px; background: #f4efe3; border-radius: 8px; }

/* ---------- Questions ---------- */

.questions-stack { display: grid; gap: 16px; }
.question-block { background: var(--paper-raised); border: 1.5px solid var(--line); border-radius: 14px; padding: 18px 20px; }
.question-label { font-weight: 700; font-size: 14.5px; margin: 0 0 12px; color: var(--ink); }
.marker-tag { font-family: var(--mono); font-weight: 400; color: var(--ink-soft); font-size: 12.5px; }

.options-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 8px; }
.option-btn {
  display: flex; align-items: flex-start; gap: 10px; text-align: left; background: var(--paper);
  border: 1.5px solid var(--line); border-radius: 10px; padding: 9px 13px; font-size: 14.5px;
  color: var(--ink); transition: border-color 0.12s, background 0.12s;
}
.option-btn:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-soft); }
.option-letter { font-family: var(--mono); font-weight: 700; color: var(--accent-deep); flex-shrink: 0; }
.option-text { flex: 1; }
.option-correct { background: var(--good-bg); border-color: var(--good); }
.option-correct .option-letter { color: var(--good); }
.option-wrong { background: var(--bad-bg); border-color: var(--bad); }
.option-wrong .option-letter { color: var(--bad); }
.option-disabled { opacity: 0.5; }
.option-btn:disabled { cursor: default; }

.explain-block { margin-top: 14px; border-radius: 10px; padding: 13px 15px; }
.explain-correct { background: var(--good-bg); }
.explain-wrong { background: var(--bad-bg); }
.explain-verdict { font-weight: 700; font-size: 14px; margin: 0 0 8px; }
.explain-correct .explain-verdict { color: var(--good); }
.explain-wrong .explain-verdict { color: var(--bad); }
.explain-text { font-size: 14.5px; line-height: 1.75; color: var(--ink); margin: 0; }

/* ---------- Gamification: XP/streak/badges/leaderboard screens ---------- */

.gami-screen { max-width: 920px; margin: 0 auto; padding: 32px 24px 80px; }
.gami-section-title {
  font-family: var(--serif); font-size: 21px; font-weight: 700; color: var(--accent-deep);
  margin: 32px 0 14px; display: flex; align-items: center; gap: 8px;
}
.profile-card { background: linear-gradient(135deg, #2a2118, #4a3220); color: #f4ead8; border-radius: 18px; padding: 26px; }
.profile-top { display: flex; align-items: center; gap: 16px; }
.avatar-circle { width: 60px; height: 60px; border-radius: 50%; background: var(--gold); display: flex; align-items: center; justify-content: center; font-size: 26px; font-weight: 800; color: #2a2118; flex-shrink: 0; }
.profile-name { font-family: var(--serif); font-size: 19px; font-weight: 700; }
.profile-level { color: var(--gold-light); font-size: 14px; font-weight: 600; margin-top: 2px; }
.streak-row { display: flex; gap: 14px; margin-top: 18px; flex-wrap: wrap; }
.streak-box { background: rgba(255,255,255,0.08); border-radius: 12px; padding: 10px 16px; flex: 1; min-width: 110px; }
.streak-box .sb-num { font-size: 22px; font-weight: 800; }
.streak-box .sb-label { font-size: 12.5px; color: #d8c4a4; }
.calendar-strip { display: flex; gap: 5px; margin-top: 16px; overflow-x: auto; padding-bottom: 4px; }
.cal-day { width: 32px; height: 32px; border-radius: 9px; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; color: #d8c4a4; }
.cal-day.done { background: var(--gold); color: #2a2118; font-weight: 800; }

.badge-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(82px, 1fr)); gap: 12px; margin-top: 10px; }
.badge-item { text-align: center; }
.badge-circle { width: 58px; height: 58px; border-radius: 50%; background: var(--paper); border: 2px solid var(--line); display: flex; align-items: center; justify-content: center; font-size: 24px; margin: 0 auto 6px; }
.badge-item.earned .badge-circle { background: var(--accent-soft); border-color: var(--gold); }
.badge-item .badge-label { font-size: 11.5px; color: var(--ink-soft); }

.zone-progress-card { background: var(--paper-raised); border: 1.5px solid var(--line); border-radius: 14px; padding: 16px 18px; margin-bottom: 10px; box-shadow: var(--shadow); }
.zone-progress-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.zone-progress-name { font-family: var(--serif); font-weight: 700; color: var(--accent-deep); }
.zone-progress-pct { font-weight: 800; color: var(--good); }
.zone-progress-bar-track { height: 7px; background: var(--line); border-radius: 999px; overflow: hidden; }
.zone-progress-bar-fill { height: 100%; background: var(--good); border-radius: 999px; }

.leaderboard-list { display: flex; flex-direction: column; gap: 8px; }
.lb-row { display: flex; align-items: center; gap: 14px; background: var(--paper-raised); border: 1.5px solid var(--line); border-radius: 14px; padding: 11px 16px; box-shadow: var(--shadow); }
.lb-rank { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 13px; background: var(--paper); color: var(--ink-soft); flex-shrink: 0; }
.lb-row.rank-1 .lb-rank { background: #f5d76e; color: #6b4f00; }
.lb-row.rank-2 .lb-rank { background: #d9d9d9; color: #555; }
.lb-row.rank-3 .lb-rank { background: #e0b189; color: #5c3a1e; }

ess since the 1920s, proposing w explanations for the phenomenon. Some researchers point out that as trees often grow close together, treetops can easily collide and break when swayed by the wind. In order to protect their branches from breakage, trees maintain \"shyness gaps\"—spaces large enough to prevent them from touching their neighbors.\nOther scientists suggest that plants, like animals, e resources—nutrients, water, space, and light. In forested areas with thick tree crowns, there is intense struggle for these resources. Gaps in the treetops resulting from crown shyness may allow trees to increase their r light and enhance photosynthesis. Additionally, by having branches that do not touch those of their neighbors, trees may be able to limit the spread of leaf-eating insects, and potentially also the transmission of diseases from tree to tree. t decades of investigation, there is no consensus on exactly what causes the beautiful and mysterious phenomenon of crown shyness.", "translation": "在某些森林裡，當你抬頭往上看，會看到一張由樹枝最外緣間的縫隙所形成的裂痕網絡。 它看起來就像一幅精密設計的拼圖，每根樹枝都恰到好處地生長，幾乎（　q　）就要碰到鄰近的樹。 這個美麗的現象被稱為「樹冠羞避」。 科學家自1920年代以來一直在討論樹冠羞避現象，並針對此現象提出（　w　）解釋。 一些研究人員指出，由於樹木經常生長得很靠近，當被風吹動時，樹冠容易互相碰撞並折斷。 為了保護自己的樹枝不被折斷，樹木會維持「羞避間隙」——足以讓它們不會碰到鄰樹的空間。 其他科學家則主張，植物就像動物一樣，會（　e　）資源——養分、水、空間和光線。 在樹冠濃密的森林地區，對這些資源的爭奪十分激烈。 樹冠羞避所形成的樹頂縫隙，可能讓樹木能增加它們對光線的（　r　），並提升光合作用。 此外，藉由讓樹枝不去碰觸鄰樹的樹枝，樹木或許也能限制食葉昆蟲的擴散，以及可能存在的樹與樹之間疾病的傳播。 （　t　）數十年的研究，學界仍未對究竟是什麼導致了這個美麗又神秘的樹冠羞避現象達成共識。", "vocab": [{"word": "network", "pos": "n.", "meaning": "網絡"}, {"word": "jigsaw puzzle", "pos": "n.", "meaning": "拼圖"}, {"word": "collide", "pos": "v.", "meaning": "碰撞"}, {"word": "breakage", "pos": "n.", "meaning": "破損"}, {"word": "photosynthesis", "pos": "n.", "meaning": "光合作用"}, {"word": "transmission", "pos": "n.", "meaning": "傳播；傳染"}, {"word": "consensus", "pos": "n.", "meaning": "共識"}, {"word": "despite", "pos": "prep.", "meaning": "儘管"}], "blank_positions": {"q": [232], "w": [389], "e": [754], "r": [975], "t": [1219]}, "passage_sentence_of nd bullet squibs", "role": "O", "start": 1280, "end": 1360}, {"text": ".", "role": "TOPIC", "start": 1360, "end": 1361}], [{"text": "That technology", "role": "S", "start": 1362, "end": 1377}, {"text": "has continued to evolve", "role": "V", "start": 1378, "end": 1401}, {"text": "into the present", "role": "M", "start": 1402, "end": 1418}, {"text": ".", "role": "TOPIC", "start": 1418, "end": 1419}], [{"text": "Today,", "role": "M", "start": 1420, "end": 1426}, {"text": "CGI (computer generated imagery)", "role": "S", "start": 1427, "end": 1459}, {"text": "is widely used", "role": "V", "start": 1460, "end": 1474}, {"text": "in filmmaking,", "role": "M", "start": 1475, "end": 1489}, {"text": "and", "role": "CONJ", "start": 1490, "end": 1493}, {"text": "it is now o to create very lifelike scenes without using real stunt people", "role": "S", "start": 1494, "end": 1568}, {"text": ".", "role": "TOPIC", "start": 1568, "end": 1569}], [{"text": "However,", "role": "CONJ", "start": 1570, "end": 1578}, {"text": "CGI", "role": "S", "start": 1579, "end": 1582}, {"text": "has", "role": "V", "start": 1583, "end": 1586}, {"text": "difficulties of its own,", "role": "O", "start": 1587, "end": 1611}, {"text": "and", "role": "CONJ", "start": 1612, "end": 1615}, {"text": "there will always be a demand for the realism and thrilling p of an actual stunt", "role": "S", "start": 1616, "end": 1696}, {"text": ".", "role": "TOPIC", "start": 1696, "end": 1697}], [{"text": "So", "role": "CONJ", "start": 1698, "end": 1700}, {"text": "the stunt industry", "role": "S", "start": 1701, "end": 1719}, {"text": "is", "role": "V", "start": 1720, "end": 1722}, {"text": "probably in no immediate danger of dying off", "role": "C", "start": 1723, "end": 1767}, {"text": ".", "role": "TOPIC", "start": 1767, "end": 1768}]], "passage_translations": ["特技演員是指表演危險動作的男性或女性，通常活躍於電視或電影產業中。", "在這個行業中，這些人是有薪去執行被認為對一般演員來說太（　q　）的大膽動作，包括從高處跳下、撞車，或持武器打鬥。", "特技工作隨著時間因（　w　）而逐漸發展出來。", "在電影產業初期，演員自己拍攝特技動作和危險場景，直到他們開始受傷。", "然而，當時並沒有（　e　）的工作人員能表演令人印象深刻的特技。", "如果一個場景需要做危險動作，製作人就會雇用任何夠瘋狂或夠不顧一切去做的人。", "這些人沒有受過特技訓練，所以他們經常是在實際拍攝時才第一次（　r　）這些動作。", "他們得從自己的錯誤中學習，這些錯誤（　t　）了一些人的生命，而幾乎所有人都遭受輕傷或重傷。", "從1910年左右開始，觀眾開始喜愛系列動作電影，這（　y　）了專職特技演員在危險場景中表演的需求。", "這種需求隨著西部片的興起而增加，許多擁有精湛馬術技巧的牛仔便找到了成為特技演員的新（　u　）。", "湯姆．米克斯和雅吉瑪．卡努特是其中最有名的兩位。", "1960和70年代（　i　）了大多數現代特技技術的發展，例如氣動彈跳裝置和子彈爆破特效。", "這項技術持續演進至今。", "如今，電腦生成影像（CGI）廣泛應用於電影製作，現在（　o　）不使用真人特技演員就能創造出非常逼真的場景。", "然而，CGI也有自身的難題，人們永遠都會對真實特技所帶來的真實感和刺激（　p　）有所需求。", "所以，特技這個行業大概沒有立即消亡的危險。"], "questions": [{"marker": "q", "correct": "C"}, {"marker": "w", "correct": "I"}, {"marker": "e", "correct": "F"}, {"marker": "r", "correct": "H"}, {"marker": "t", "correct": "D"}, {"marker": "y", "correct": "G"}, {"marker": "u", "correct": "J"}, {"marker": "i", "correct": "E"}, {"marker": "o", "correct": "A"}, {"marker": "p", "correct": "B"}]}], "paragraph_structure": [{"id": "p1-d1", "year": "113", "title": "Exercise & Injury", "passage": "While Dr. Weinstein, a surgeon at Dartmouth College, was trying to lift a heavy box, he twisted his back. The pain was agonizing. The surgeon could not sit, and when he lay down he could barely get up. So he decided to go out for a run. He took an aspirin, iced the injured area, and off he went. When he returned, he felt \"pretty good.\"\n1 When people have sprained a muscle or tendon, they are usually advised not to go right back to exercising until the pain goes away. But Dr. Weinstein says that approach is outdated and counterproductive. In fact, when active people consult him, he usually tells them to just keep exercising.\nDr. Weinstein is not alone in his treatment of sports injury, but the specific advice can differ from specialist to specialist. 2 They nevertheless caution that a cutback may be necessary, such as running shorter distances or going more slowly. Others say the patients may need to engage in sports outside of their usual, main sport (that is, to cross-train), at least some of the time. Still others say the safest thing to do is cross-train all the time until the pain is gone. 3 Their consensus, however, is that unless the injury involves something as serious as a broken bone or a ripped muscle, moderate exercise can actually speed healing.\n4 Thus, more and more patients are now advised to keep moving despite the pain. The rule of thumb, however, is to see a doctor first and get an accurate diagnosis. If a serious injury is ruled out and the pain is not getting worse after exercising, then the exercise \"makes a lot of sense.\"", "translation": "達特茅斯學院的外科醫生溫斯坦醫生在試圖搬起一個重箱子時，扭傷了背。 那種疼痛十分劇烈。 這位外科醫生坐不下來，而當他躺下時，幾乎站不起來。 於是他決定外出跑步。 他吃了一顆阿斯匹靈，冰敷了受傷的部位，然後就出門了。 當他回來時，他感覺「相當不錯」。 （　1　）當人們的肌肉或肌腱扭傷時，通常會被建議不要在疼痛消失前就立刻恢復運動。 但溫斯坦醫生說，這種做法已經過時且會產生反效果。 事實上，當經常運動的人來向他諮詢時，他通常會告訴他們繼續運動就好。 溫斯坦醫生的運動傷害治療方式並非特例，但具體的建議可能因專科醫生而異。 （　2　）不過他們仍提醒，可能有必要減量，例如縮短跑步距離或放慢速度。 其他醫生則表示，病人或許需要至少有部分時間從事自己平常主要運動以外的運動（也就是交叉訓練）。 還有些醫生則說，最安全的做法是一直進行交叉訓練，直到疼痛消失為止。 （　3　）然而，他們一致的看法是，除非傷勢嚴重到像是骨折或肌肉撕裂，適度運動其實能加速復原。 （　4　）因此，越來越多病人現在被建議即使會痛也要持續活動。 然而，基本原則是要先就醫，獲得準確的診斷。 如果排除了嚴重傷害的可能，且運動後疼痛沒有加劇，那麼運動「就很合理了」。", "vocab": [{"word": "agonizing", "pos": "adj.", "meaning": "極度痛苦的"}, {"word": "sprain", "pos": "v.", "meaning": "扭傷"}, {"word": "counterproductive", "pos": "adj.", "meaning": "產生反效果的"}, {"word": "cross-train", "pos": "v.", "meaning": "交叉訓練"}, {"word": "rule of thumb", "pos": "phr.", "meaning": "經驗法則"}], "options": [["A", "For example, an injured runner might end up cycling and swimming instead of running."], ["B", "Over time, researchers have come to realize the importance of exercising when injured."], ["C", "Many suggest that most patients can continue with the sport they love."], ["D", "This seems to run counter to the common practice."]], "blank_positions": {"1": [338], "2": [760], "3": [1111], "4": [1278]}, "passage_sentence_offsets": [{"start": 0, "len": 105}, {"start": 106, "len": 23}, {"start": 130, "len": 71}, {"start": 202, "len": 34}, {"start": 237, "len": 59}, {"start": 297, "len": 40}, {"start": 338, "len": 133}, {"start": 472, : 1385}, {"text": "is", "role": "V", "start": 1386, "end": 1388}, {"text": "to see a doctor first and get an accurate diagnosis", "role": "C", "start": 1389, "end": 1440}, {"text": ".", "role": "TOPIC", "start": 1440, "end": 1441}], [{"text": "If a serious injury is ruled out and the pain is not getting worse after exercising,", "role": "CONJ", "start": 1442, "end": 1526}, {"text": "then", "role": "M", "start": 1527, "end": 1531}, {"text": "the exercise", "role": "S", "start": 1532, "end": 1544}, {"text": "\"makes a lot of sense.\"", "role": "C", "start": 1545, "end": 1568}]], "passage_translations": ["達特茅斯學院的外科醫生溫斯坦醫生在試圖搬起一個重箱子時，扭傷了背。", "那種疼痛十分劇烈。", "這位外科醫生坐不下來，而當他躺下時，幾乎站不起來。", "於是他決定外出跑步。", "他吃了一顆阿斯匹靈，冰敷了受傷的部位，然後就出門了。", "當他回來時，他感覺「相當不錯」。", "（　1　）當人們的肌肉或肌腱扭傷時，通常會被建議不要在疼痛消失前就立刻恢復運動。", "但溫斯坦醫生說，這種做法已經過時且會產生反效果。", "事實上，當經常運動的人來向他諮詢時，他通常會告訴他們繼續運動就好。", "溫斯坦醫生的運動傷害治療方式並非特例，但具體的建議可能因專科醫生而異。", "（　2　）不過他們仍提醒，可能有必要減量，例如縮短跑步距離或放慢速度。", "其他醫生則表示，病人或許需要至少有部分時間從事自己平常主要運動以外的運動（也就是交叉訓練）。", "還有些醫生則說，最安全的做法是一直進行交叉訓練，直到疼痛消失為止。", "（　3　）然而，他們一致的看法是，除非傷勢嚴重到像是骨折或肌肉撕裂，適度運動其實能加速復原。", "（　4　）因此，越來越多病人現在被建議即使會痛也要持續活動。", "然而，基本原則是要先就醫，獲得準確的診斷。", "如果排除了嚴重傷害的可能，且運動後疼痛沒有加劇，那麼運動「就很合理了」。"], "questions": [{"marker": "1", "correct": "D"}, {"marker": "2", "correct": "C"}, {"marker": "3", "correct": "A"}, {"marker": "4", "correct": "B"}]}, {"id": "p1-d2", "year": "112", "title": "Synesthesia", "passage": "Have you ever thought of \"coloring\" the names of the days of the week? When you listen to someone speaking, do you see a rainbow of colors? Or perhaps Mozart's music tastes like an apple pie to you? If so, it is very likely that you have synesthesia.\nSynesthesia is a condition in which people's senses intermix. In some cases, people with synesthesia may experience colors when they hear, read, or even think of letters and numbers. In others, words can trigger a real sensation of taste on their tongue.\n5 In the early 1990s, however, scientists noticed that synesthetic colors do not change over time. When asked what color is evoked by a letter or number, synesthetic people would persistently give the same answer even if tested months or years apart. 6 The most compelling support, however, comes from brain scans, which show that color processing areas in the brain light up when these people listen to certain words.\nIs synesthesia genetically inherited or acquired after birth? Scientists agree that synesthesia has a genetic basis, because it frequently runs in families. But an actual synesthesia gene (or genes) has not been identified yet. 7 For example, the flavors people with taste-word synesthesia experience are usually childhood flavors, such as chocolate or strawberries. Also, people with color-music synesthesia more often than not have had early musical training.\nOnce thought to be extremely rare, synesthesia is now found to affect about one to four percent of the population. 8 As is often observed, most of us tend to associate lower notes with darker colors and higher notes with brighter colors. Researchers further point out that in most people synesthesia is active only during the first months of their infancy, while this ability remains forever in certain individuals.", "translation": "你是否曾想過將一週各天的名稱「染上顏色」？ 當你聽某人說話時，會看到一道彩虹般的色彩嗎？ 又或者，莫札特的音樂對你來說嚐起來像蘋果派？ 如果是這樣，你很有可能擁有聯覺。 聯覺是一種人的感官會互相混合的狀態。 在某些情況下，有聯覺的人在聽、讀，甚至只是想到字母和數字時，可能會經歷到顏色。 在另一些情況下，文字可能會在他們的舌頭上觸發真實的味覺感受。 （　5　）然而在1990年代初期，科學家注意到聯覺色彩不會隨時間改變。 當被問到某個字母或數字會喚起什麼顏色時，有聯覺的人即使在相隔數月或數年後再次測試，仍會持續給出相同的答案。 （　6　）然而，最有力的支持證據來自大腦掃描，顯示出當這些人聽到特定字詞時，大腦中處理色彩的區域會亮起。 聯覺是基因遺傳的，還是出生後才獲得的？ 科學家一致認為聯覺具有基因基礎，因為它經常在家族中遺傳。 但實際上的聯覺基因（或基因群）目前尚未被確認。 （　7　）舉例來說，有文字味覺聯覺的人所經歷到的味道，通常是童年時期的味道，例如巧克力或草莓。 此外，有色彩音樂聯覺的人，多半在早年都接受過音樂訓練。 聯覺曾被認為極其罕見，但現在發現它影響約百分之一到百分之四的人口。 （　8　）正如常被觀察到的，我們大多數人傾向將較低的音符與較暗的顏色聯想在一起，而較高的音符則與較亮的顏色聯想在一起。 研究人員進一步指出，在大多數人身上，聯覺只在嬰兒期最初幾個月活躍，而在某些人身上，這種能力則會永遠保留下來。", "vocab": [{"word": "intermix", "pos": "v.", "meaning": "混合"}, {"word": "trigger", "pos": "v.", "meaning": "引發"}, {"word": "evoke", "pos": "v.", "meaning": "喚起"}, {" TOPIC", "start": 1801, "end": 1802}]], "passage_translations": ["你是否曾想過將一週各天的名稱「染上顏色」？", "當你聽某人說話時，會看到一道彩虹般的色彩嗎？", "又或者，莫札特的音樂對你來說嚐起來像蘋果派？", "如果是這樣，你很有可能擁有聯覺。", "聯覺是一種人的感官會互相混合的狀態。", "在某些情況下，有聯覺的人在聽、讀，甚至只是想到字母和數字時，可能會經歷到顏色。", "在另一些情況下，文字可能會在他們的舌頭上觸發真實的味覺感受。", "（　5　）然而在1990年代初期，科學家注意到聯覺色彩不會隨時間改變。", "當被問到某個字母或數字會喚起什麼顏色時，有聯覺的人即使在相隔數月或數年後再次測試，仍會持續給出相同的答案。", "（　6　）然而，最有力的支持證據來自大腦掃描，顯示出當這些人聽到特定字詞時，大腦中處理色彩的區域會亮起。", "聯覺是基因遺傳的，還是出生後才獲得的？", "科學家一致認為聯覺具有基因基礎，因為它經常在家族中遺傳。", "但實際上的聯覺基因（或基因群）目前尚未被確認。", "（　7　）舉例來說，有文字味覺聯覺的人所經歷到的味道，通常是童年時期的味道，例如巧克力或草莓。", "此外，有色彩音樂聯覺的人，多半在早年都接受過音樂訓練。", "聯覺曾被認為極其罕見，但現在發現它影響約百分之一到百分之四的人口。", "（　8　）正如常被觀察到的，我們大多數人傾向將較低的音符與較暗的顏色聯想在一起，而較高的音符則與較亮的顏色聯想在一起。", "研究人員進一步指出，在大多數人身上，聯覺只在嬰兒期最初幾個月活躍，而在某些人身上，這種能力則會永遠保留下來。"], "questions": [{"marker": "5", "correct": "C"}, {"marker": "6", "correct": "A"}, {"marker": "7", "correct": "B"}, {"marker": "8", "correct": "D"}]}, {"id": "p1-d3", "year": "111", "title": "Obon Festival", "passage": "Obon, or the Bon Festival, is a Japanese holiday that honors the spirits of the dead. 9 The festival usually lasts for four to five days in August. During this period, many people travel back to their hometowns and spend time with loved ones, both past and present.\nThough not a national holiday, Obon is surely one of the most traditional events of the year. Celebration often begins with mukaebi (welcoming fire), during which people make a small bonfire in front of their house to guide spirits upon their return back home. 0 Food offerings are presented at house altars and temples. Some regions prepare horses made of cucumbers and cows made of eggplants, hoping that the spirits will come back to Earth quickly, on a horse, and leave slowly, riding the cow.\nq Paper lanterns and offerings are sent floating down rivers to accompany the ancestors back to their resting place. Many areas will also organize bon-odori dances. The style of the dances varies from region to region but is normally based on the rhythms of taiko drums. Performers usually play on a tall stage with lanterns and banners strung all around. Participants, often dressed in light cotton kimonos, are encouraged to dance to the music around the stage. w Originally dedicated to the deceased, the dances have now become a symbol of the summer festival themselves.", "translation": "盂蘭盆節，又稱為Bon Festival，是一個祭拜逝者靈魂的日本節日。 （　9　）這個節日通常在八月舉行，持續四到五天。 在這段期間，許多人會返回家鄉，與親人共度時光，無論是已逝或仍在世的親人。 雖然盂蘭盆節並非國定假日，但它無疑是一年中最具傳統色彩的活動之一。 慶祝活動通常以「迎火」開始，人們會在自家門前燃起小火堆，引導靈魂返家。 （　0　）食物供品會被供奉在家中神壇和寺廟。 有些地區會準備用小黃瓜做的馬和用茄子做的牛，希望靈魂能騎著馬快速返回人間，再騎著牛緩緩離去。 （　q　）紙燈籠與供品會被放入河中漂流，陪伴祖先的靈魂返回安息之地。 許多地區也會舉辦盆舞活動。 舞蹈的風格因地區而異，但通常以太鼓的節奏為基礎。 表演者通常會在掛滿燈籠和橫幅的高台上演出。 參與者經常穿著輕便的棉質浴衣，會被鼓勵隨著音樂在舞台周圍跳舞。 （　w　）這些舞蹈最初是獻給逝者的，但現在已成為夏季祭典本身的象徵。", "vocab": [{"word": "bonfire", "pos": "n.", "meaning": "營火"}, {"word": "lantern", "pos": "n.", "meaning": "燈籠"}, {"word": "taiko drum", "pos": "n.", "meaning": "太鼓"}, {"word": "dedicate", "pos": "v.", "meaning": "奉獻；致力於"}, {"word": "the deceased", "pos": "n.", "meaning": "逝者"}], "options": [["A", "Some people also visit the cemetery to clean up the family graves and pray for their ancestors."], ["B", "Such festive activities are usually held in parks, temples, and other public places around Japan."], ["C", "Obon concludes with another bonfire, okuribi, lighting up the sky to see the ancestors' spirits off."], ["D", "Originating from the Chinese Ghost Festival, this annual event has evolved into a time of family reunion."]], "blank_positions": {"9": [86], "0": [527], "q": [764], "w": [1228]}, "passage_sentence_offsets": [{"start": 0, "len": 85}, {"start": 86, "len": 61}, {"start": 148, "len": 117}, {"start": 266, "len": 93}, {"start": 360, "len": 166}, {"start": 527, "len": 59}, {"start": 587, "len": 176}, {"start": 764, "len": 116}, {"start": 881, "len": 47}, {"start": 929, "len": 105}, {"start": 1035, "len": 84}, {"start": 1120, "len": 107}, {"start": 1228, "len": 110}], "passage_grammar": [[{"text": "Obon, or the Bon Festival,", "role": "S", "start": 0, "end": 26} <script>
/* ============================================================
   克漏字開外掛 v2 — 核心邏輯

// ============================================================
// GAMIFICATION: state, storage, XP/level curve, badges
// ============================================================
const STORAGE_KEY = 'cloze_app_state_v2';
const LEADERBOARD_KEY = 'cloze_app_leaderboard_v2';

const BADGES = [
  { id: 'first_step', label: '初次挑戰', icon: '🎯', cond: s => s.totalAnswered >= 1 },
  { id: 'streak3', label: '連續3天', icon: '🔥', cond: s => s.streak >= 3 },
  { id: 'streak7', label: '連續7天', icon: '⚡', cond: s => s.streak >= 7 },
  { id: 'streak30', label: '連續30天', icon: '👑', cond: s => s.streak >= 30 },
  { id: 'century', label: '百題達成', icon: '💯', cond: s => s.totalAnswered >= 100 },
  { id: 'perfectionist', label: '完美一篇', icon: '✨', cond: s => s.perfectPassages >= 1 },
  { id: 'level5', label: 'Lv.5 達成', icon: '🥈', cond: s => levelFromXp(s.xp).level >= 5 },
  { id: 'level10', label: 'Lv.10 達成', icon: '🥇', cond: s => levelFromXp(s.xp).level >= 10 },
  { id: 'grammar_explorer', label: '文法偵探', icon: '🔍', cond: s => (s.treeOpens || 0) >= 10 },
];

function xpForLevel(level) { return Math.round(50 * level * level); }
function levelFromXp(xp) {
  let level = 1;
  while (xpForLevel(level + 1) <= xp) level++;
  const curBase = xpForLevel(level);
  const nextBase = xpForLevel(level + 1);
  const progress = (xp - curBase) / (nextBase - curBase);
  return { level, curBase, nextBase, progress: Math.max(0, Math.min(1, progress)) };
}

function defaultState() {
  return {
    xp: 0, streak: 0, lastActiveDate: null, activeDates: [],
    totalAnswered: 0, totalCorrect: 0, perfectPassages: 0,
    earnedBadges: [], passageProgress: {}, treeOpens: 0, name: '我',
  };
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultState();
    return Object.assign(defaultState(), JSON.parse(raw));
  } catch (e) { return defaultState(); }
}
function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(STATE)); }

function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function touchStreak() {
  const today = todayStr();
  if (STATE.lastActiveDate === today) return;
  if (!STATE.activeDates.includes(today)) STATE.activeDates.push(today);
  if (STATE.lastActiveDate) {
    const diffDays = Math.round((new Date(today) - new Date(STATE.lastActiveDate)) / 86400000);
    if (diffDays === 1) STATE.streak += 1;
    else if (diffDays > 1) STATE.streak = 1;
  } else {
    STATE.streak = 1;
  }
  STATE.lastActiveDate = today;
  saveState();
}

function addXp(amount) {
  const before = levelFromXp(STATE.xp).level;
  STATE.xp += amount;
  const after = levelFromXp(STATE.xp).level;
  saveState();
  showXpToast(amount);
  return after > before ? after : null;
}

function showXpToast(amount) {
  const toast = document.getElementById('xpToast');
  if (!toast) return;
  toast.textContent = (amount >= 0 ? '✨ +' : '') + amount + ' XP';
  toast.classList.add('show');
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => toast.classList.remove('show'), 1400);
}

function checkNewBadges() {
  const newly = [];
  BADGES.forEach(b => {
    if (!STATE.earnedBadges.includes(b.id) && b.cond(STATE)) {
      STATE.earnedBadges.push(b.id);
      newly.push(b);
    }
  });
  if (newly.length) saveState();
  return newly;
}

function getLeaderboard() {
  try {
    const raw = localStorage.getItem(LEADERBOARD_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  const seed = [
    { name: '陳同學', xp: 1280 }, { name: '林同學', xp: 960 }, { name: '黃同學', xp: 740 },
    { name: '張同學', xp: 510 }, { name: '吳同學', xp: 320 }
  ];
  localStorage.setItem(LEADERBOARD_KEY, JSON.stringify(seed));
  return seed;
}
function renderLeaderboardData() {
  const others = getLeaderboard();
  const me = { name: STATE.name + '（你）', xp: STATE.xp, isMe: true };
  const all = others.concat([me]);
  all.sort((a, b) => b.xp - a.xp);
  return all;
}

let STATE = loadState();

// Silent mode: when on, hide passage-level "read aloud" controls; only
// per-word / per-sentence / per-option click-to-speak remain available.
const SILENT_MODE_KEY = 'cloze_app_silent_mode_v2';
let SILENT_MODE = (function () {
  try { return localStorage.getItem(SILENT_MODE_KEY) === '1'; } catch (e) { return false; }
})();
function saveSilentMode() {
  try { localStorage.setItem(SILENT_MODE_KEY, SILENT_MODE ? '1' : '0'); } catch (e) {}
}

// ============================================================
// TTS Engine
// ============================================================
let TTS_VOICE = null;
let TTS_VOICES_READY = false;

function loadVoices() {
  const voices = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
  if (voices.length) {
    // Prefer en-US voices; pick a non-network voice first (local voices are more reliable)
    TTS_VOICE = voices.find(v => v.lang === 'en-US' && !v.localService === false)  // local en-US
             || voices.find(v => v.lang === 'en-US')
             || voices.find(v => v.lang && v.lang.startsWith('en-'))
             || voices.find(v => v.lang && v.lang.startsWith('en'));
    TTS_VOICES_READY = true;
  }
}

// Chrome often returns empty list on first call; retry a few times
if (window.speechSynthesis) {
  loadVoices();
  window.speechSynthesis.onvoiceschanged = loadVoices;
  // Fallback: poll until voices load (Chrome needs this)
  let retries = 0;
  const voicePoller = setInterval(() => {
    loadVoices();
    if (TTS_VOICES_READY || ++retries > 20) clearInterval(voicePoller);
  }, 200);
}

let CURRENTLY_SPEAKING_EL = null;
let TTS_SPEAK_TIMER = null;

function speak(text, opts = {}) {
  if (!window.speechSynthesis) return;
  // Cancel any existing speech
  window.speechSynthesis.cancel();
  clearTimeout(TTS_SPEAK_TIMER);
  // Chrome bug: need a short delay after cancel() before new speak()
  TTS_SPEAK_TIMER = setTimeout(() => {
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'en-US';
    utter.rate = opts.rate || 0.92;
    utter.pitch = 1.0;
    utter.volume = 1.0;
    if (TTS_VOICE) utter.voice = TTS_VOICE;
    utter.onend = opts.onend || function () {};
    utter.onerror = (e) => {
      // silently ignore 'interrupted' errors (from cancel); log others
      if (e.error !== 'interrupted' && e.error !== 'canceled') {
        console.warn('TTS error:', e.error);
      }
      if (opts.onend) opts.onend();
    };
    // Chrome workaround: if synthesis is paused, resume it first
    if (window.speechSynthesis.paused) window.speechSynthesis.resume();
    window.speechSynthesis.speak(utter);
  }, 80);
}

function stopSpeak() {
  clearTimeout(TTS_SPEAK_TIMER);
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  if (CURRENTLY_SPEAKING_EL) { CURRENTLY_SPEAKING_EL.classList.remove('speak-btn-active'); CURRENTLY_SPEAKING_EL = null; }
}

function speakWithEl(text, el) {
  if (CURRENTLY_SPEAKING_EL === el) { stopSpeak(); return; }
  stopSpeak();
  CURRENTLY_SPEAKING_EL = el;
  if (el) el.classList.add('speak-btn-active');
  speak(text, { onend: () => { if (el) el.classList.remove('speak-btn-active'); CURRENTLY_SPEAKING_EL = null; } });
}
