// ============================================================
// CLOZE_DATA.part1 / CLOZE_DATA.unit1 each contain:
//   comprehensive: [ {id,year,title,passage(orpassage1/2),...} ]
//   vocab_fill: [ {...} ]
//   paragraph_structure: [ {...} ]
// We build a flat "ZONES" array, each zone = one printed unit (Part1 acts
// as one zone with 12 passages across 3 categories; Unit1 is a second zone).

const ZONES = [
  { id: 'part1', label: 'Part 1', title: '鑑往知來', subtitle: '學測歷屆題 · 完整短文診斷', data: CLOZE_DATA.part1, icon: '📖' },
  { id: 'unit1', label: 'Unit 1', title: 'People', subtitle: '衝刺前標 · 單元診斷', data: CLOZE_DATA.unit1, icon: '👤' },
];

const SECTION_META = {
  comprehensive: { label: '綜合測驗', shortLabel: '綜合測驗' },
  vocab_fill: { label: '文意選填', shortLabel: '文意選填' },
  paragraph_structure: { label: '篇章結構', shortLabel: '篇章結構' },
};

function findZone(zoneId) { return ZONES.find(z => z.id === zoneId); }

function findPassageItem(zoneId, sectionKey, itemIdx) {
  const zone = findZone(zoneId);
  if (!zone) return null;
  const list = zone.data[sectionKey];
  if (!list || !list[itemIdx]) return null;
  return list[itemIdx];
}

// Count total questions across an item (handles both single-passage and
// dual-passage [Unit1 comprehensive] shapes)
function countQuestions(item) {
  return (item.questions || []).length;
}

function zoneTotalQuestions(zone) {
  let total = 0;
  Object.keys(SECTION_META).forEach(key => {
    (zone.data[key] || []).forEach(item => total += countQuestions(item));
  });
  return total;
}
function zoneTotalPassages(zone) {
  let total = 0;
  Object.keys(SECTION_META).forEach(key => total += (zone.data[key] || []).length);
  return total;
}

// ---------- per-passage progress tracking ----------
function passageKey(zoneId, sectionKey, itemIdx) { return `${zoneId}:${sectionKey}:${itemIdx}`; }
function getPassageProgress(pk) { return STATE.passageProgress[pk] || null; }

function computeZoneStats(zone) {
  let doneQ = 0, totalQ = 0, donePassages = 0, totalPassages = 0;
  Object.keys(SECTION_META).forEach(sectionKey => {
    (zone.data[sectionKey] || []).forEach((item, idx) => {
      totalPassages++;
      totalQ += countQuestions(item);
      const pk = passageKey(zone.id, sectionKey, idx);
      const prog = getPassageProgress(pk);
      if (prog) {
        doneQ += prog.correctCount || 0;
        if (prog.completed) donePassages++;
      }
    });
  });
  return { doneQ, totalQ, donePassages, totalPassages };
}

// ============================================================
// Hash router
// ============================================================
// Routes:
//   #/                              -> home
//   #/zone/{zoneId}                 -> unit view, default section
//   #/zone/{zoneId}/{sectionKey}    -> unit view, specific section tab
//   #/progress                      -> gamification progress screen
//   #/leaderboard                   -> leaderboard screen

function parseHash() {
  const h = (location.hash || '#/').replace(/^#\/?/, '');
  const parts = h.split('/').filter(Boolean);
  if (parts.length === 0) return { screen: 'home' };
  if (parts[0] === 'zone') return { screen: 'zone', zoneId: parts[1], sectionKey: parts[2] || null };
  if (parts[0] === 'progress') return { screen: 'progress' };
  if (parts[0] === 'leaderboard') return { screen: 'leaderboard' };
  return { screen: 'home' };
}

function navigate(path) { location.hash = path; }

window.addEventListener('hashchange', render);
document.addEventListener('DOMContentLoaded', () => { renderTopbar(); render(); });

// ============================================================
// Render: top XP bar (always visible)
// ============================================================
function renderTopbar() {
  const lv = levelFromXp(STATE.xp);
  document.getElementById('xpStatsRow').innerHTML = `
    <div class="xp-nav-tabs">
      <button class="xp-nav-tab" data-nav="#/">練習</button>
      <button class="xp-nav-tab" data-nav="#/progress">我的進度</button>
      <button class="xp-nav-tab" data-nav="#/leaderboard">排行榜</button>
    </div>
    <div class="xp-lv-badge">Lv.${lv.level}</div>
    <div class="xp-pill">✨ ${STATE.xp} XP</div>
    <div class="xp-pill">🔥 ${STATE.streak} 天</div>
  `;
  document.getElementById('xpBarFill').style.width = (lv.progress * 100).toFixed(1) + '%';
  const r = parseHash();
  document.querySelectorAll('.xp-nav-tab').forEach(t => {
    const active = (t.dataset.nav === '#/' && r.screen === 'home' || t.dataset.nav === '#/zone' && r.screen === 'zone')
      || (t.dataset.nav === '#/progress' && r.screen === 'progress')
      || (t.dataset.nav === '#/leaderboard' && r.screen === 'leaderboard')
      || (t.dataset.nav === '#/' && r.screen === 'zone');
    t.classList.toggle('active', active);
    t.addEventListener('click', () => navigate(t.dataset.nav));
  });
}

// ============================================================
// Master render dispatcher
// ============================================================
function render() {
  const r = parseHash();
  const app = document.getElementById('app');
  stopSpeak();
  renderTopbar();
  if (r.screen === 'home') { app.innerHTML = renderHomeHtml(); bindHomeEvents(); }
  else if (r.screen === 'zone') { renderZoneScreen(r.zoneId, r.sectionKey); }
  else if (r.screen === 'progress') { app.innerHTML = renderProgressHtml(); bindProgressEvents(); }
  else if (r.screen === 'leaderboard') { app.innerHTML = renderLeaderboardHtml(); }
  window.scrollTo({ top: 0, behavior: 'instant' });
}

// ============================================================
// HOME screen
// ============================================================
function renderHomeHtml() {
  let zonesHtml = ZONES.map(zone => {
    const stats = computeZoneStats(zone);
    const pct = stats.totalQ ? Math.round(100 * stats.doneQ / stats.totalQ) : 0;
    const progClass = pct > 0 ? '' : 'unit-card-progress-empty';
    const progText = pct > 0 ? `${stats.doneQ}/${stats.totalQ} 題（${pct}%）` : '尚未開始';
    return `
      <button class="unit-card" data-zone="${zone.id}">
        <div class="unit-card-num">${zone.icon} ${zone.label}</div>
        <div class="unit-card-title">${zone.title}</div>
        <div class="unit-card-progress ${progClass}">${progText}</div>
      </button>
    `;
  }).join('');

  return `
    <div class="top-hero">
      <div class="hero-inner">
        <p class="hero-eyebrow">CLOZE DIAGNOSTIC SYSTEM</p>
        <h1 class="hero-title">克漏字開外掛<span class="hero-title-sub">學測克漏字診斷</span></h1>
        <p class="hero-desc">完整短文情境 × 句子結構拆解 × 逐句中譯朗讀，搭配 XP 等級與連續天數，陪你扎實練好每一格克漏字。</p>
      </div>
    </div>
    <div class="home-main">
      <div class="category-block">
        <h2 class="category-title">練習範圍 <span class="category-title-zh">點選進入</span></h2>
        <div class="unit-grid">${zonesHtml}</div>
      </div>
    </div>
  `;
}

function bindHomeEvents() {
  document.querySelectorAll('[data-zone]').forEach(card => {
    card.addEventListener('click', () => navigate('#/zone/' + card.dataset.zone));
  });
}

// ============================================================
// ZONE / UNIT screen
// ============================================================

// Per-passage UI toggle state (not persisted — resets on reload, purely
// view-state for "show structure tree" / "show translation" per sentence)
const VIEW_STATE = {}; // key: `${pk}-${sentenceIdx}` -> {tree:bool, translation:bool}
function getViewState(key) {
  if (!VIEW_STATE[key]) VIEW_STATE[key] = { tree: false, translation: false };
  return VIEW_STATE[key];
}

function renderZoneScreen(zoneId, sectionKey) {
  const zone = findZone(zoneId);
  const app = document.getElementById('app');
  if (!zone) { navigate('#/'); return; }
  const availableSections = Object.keys(SECTION_META).filter(k => (zone.data[k] || []).length > 0);
  const activeSection = sectionKey && availableSections.includes(sectionKey) ? sectionKey : availableSections[0];

  const stats = computeZoneStats(zone);
  const pct = stats.totalQ ? Math.round(100 * stats.doneQ / stats.totalQ) : 0;

  const tabsHtml = availableSections.map(key => `
    <button class="section-tab ${key === activeSection ? 'section-tab-active' : ''}" data-section="${key}">
      ${SECTION_META[key].shortLabel}
    </button>
  `).join('');

  app.innerHTML = `
    <div class="unit-header">
      <button class="back-btn" id="zoneBackBtn">‹ 返回練習列表</button>
      <div class="unit-header-title">
        <div class="unit-header-num">${zone.icon} ${zone.label} ${zone.title}</div>
        <div class="unit-header-cat">${zone.subtitle} · 完成 ${stats.doneQ}/${stats.totalQ} 題（${pct}%）</div>
      </div>
    </div>
    <div class="section-tabs">${tabsHtml}</div>
    <div class="unit-main" id="unitMain"></div>
  `;

  document.getElementById('zoneBackBtn').addEventListener('click', () => navigate('#/'));
  document.querySelectorAll('.section-tab').forEach(tab => {
    tab.addEventListener('click', () => navigate(`#/zone/${zoneId}/${tab.dataset.section}`));
  });

  renderSectionItems(zone, activeSection);
}

function renderSectionItems(zone, sectionKey) {
  const main = document.getElementById('unitMain');
  const items = zone.data[sectionKey] || [];
  main.innerHTML = items.map((item, idx) => renderPassageGroup(zone, sectionKey, item, idx)).join('');
  bindUnitMainDelegation(zone, sectionKey);
}

// ------------------------------------------------------------
// Passage group: title + 2-col layout (passage | questions)
// Handles 3 shapes:
//   A) comprehensive with single `passage` (Part1 6 articles)
//   B) comprehensive with `passage1`+`passage2` (Unit1, 2 sub-blocks)
//   C) vocab_fill / paragraph_structure (single `passage`, options A-J/A-E)
// ------------------------------------------------------------
function renderPassageGroup(zone, sectionKey, item, itemIdx) {
  const pk = passageKey(zone.id, sectionKey, itemIdx);
  const hasDualPassage = !!item.passage1 && !!item.passage2;

  if (hasDualPassage) {
    const block1 = renderSinglePassageBlock(zone, sectionKey, item, itemIdx, {
      passage: item.passage1, grammar: item.passage1_grammar, offsets: item.passage1_sentence_offsets,
      translations: item.passage1_translations, fullTranslation: item.translation1,
      qFilter: q => q.qnum_int <= 5, blockSuffix: '1'
    });
    const block2 = renderSinglePassageBlock(zone, sectionKey, item, itemIdx, {
      passage: item.passage2, grammar: item.passage2_grammar, offsets: item.passage2_sentence_offsets,
      translations: item.passage2_translations, fullTranslation: item.translation2,
      qFilter: q => q.qnum_int > 5, blockSuffix: '2'
    });
    return `
      <div class="passage-group">
        <h3 class="passage-group-title">${SECTION_META[sectionKey].label} — ${item.title}</h3>
        ${block1}
        ${block2}
      </div>
    `;
  }

  const block = renderSinglePassageBlock(zone, sectionKey, item, itemIdx, {
    passage: item.passage, grammar: item.passage_grammar, offsets: item.passage_sentence_offsets,
    translations: item.passage_translations, fullTranslation: item.translation,
    qFilter: () => true, blockSuffix: '0'
  });
  return `
    <div class="passage-group">
      <h3 class="passage-group-title">${SECTION_META[sectionKey].label} — ${item.title}${item.year ? '（' + item.year + ' 年學測）' : ''}</h3>
      ${block}
    </div>
  `;
}

function renderSinglePassageBlock(zone, sectionKey, item, itemIdx, cfg) {
  const pk = passageKey(zone.id, sectionKey, itemIdx) + '-' + cfg.blockSuffix;
  const prog = getPassageProgress(pk) || { answers: {} };
  const questions = (item.questions || []).filter(cfg.qFilter);

  const passageHtml = renderPassageWithGrammar(pk, cfg.passage, cfg.grammar, cfg.offsets, cfg.translations, questions, prog.answers);

  const isVocabBank = !!item.options && sectionKey !== 'paragraph_structure_NEVER'; // vocab_fill always has options A-J
  const isParagraphOptions = sectionKey === 'paragraph_structure';

  let questionsHtml;
  if (sectionKey === 'vocab_fill') {
    questionsHtml = renderVocabBankAndQuestions(pk, item, questions, prog.answers);
  } else if (sectionKey === 'paragraph_structure') {
    questionsHtml = renderParagraphOptionsAndQuestions(pk, item, questions, prog.answers);
  } else {
    questionsHtml = renderStandardQuestions(pk, questions, prog.answers);
  }

  const vocabHtml = (item.vocab && item.vocab.length) ? `
    <details class="vocab-details">
      <summary>單字補充（${item.vocab.length}）</summary>
      <ul class="vocab-list">${item.vocab.map(v => `<li>${escapeHtml(typeof v === 'string' ? v : (v.word + ' (' + v.pos + ') ' + v.meaning))}</li>`).join('')}</ul>
    </details>
  ` : '';

  return `
    <div class="passage-group-columns">
      <div class="passage-col">
        <div class="passage-card">
          <div class="grammar-legend-bar">
            <span class="glb-item glb-S">S 主詞</span>
            <span class="glb-item glb-V">V 動詞</span>
            <span class="glb-item glb-O">O 受詞</span>
            <span class="glb-item glb-C">C 補語</span>
            <span class="glb-item glb-M">M 修飾語</span>
            <span class="glb-item glb-CONJ">CONJ 連接詞/子句</span>
            <span class="glb-item glb-REL">REL 關係子句</span>
          </div>
          ${passageHtml}
          ${vocabHtml}
        </div>
      </div>
      <div class="questions-col">
        ${questionsHtml}
      </div>
    </div>
  `;
}

// ============================================================
// Passage + sentence grammar rendering
// ============================================================

const ROLE_LABELS = { S: '主詞', V: '動詞', O: '受詞', C: '補語', M: '修飾語', CONJ: '連接', REL: '關係子句', TOPIC: '—' };

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function escapeAttr(s) { return escapeHtml(s).replace(/"/g, '&quot;'); }

// Render full passage broken into sentences; each sentence supports:
//  - inline 🔊 speak button (reads that sentence aloud, skipping blank markers)
//  - inline 🌳 tree-toggle button (reveals grammar structure breakdown below it)
//  - translation shown inline once toggled (sentence-level)
// Blanks (markers found via questions[].marker) are rendered as styled
// blank-widgets showing the student's answer letter or empty state.
function renderPassageWithGrammar(pk, passageText, grammarSentences, offsets, translations, questions, userAnswers) {
  if (!grammarSentences || !offsets) {
    // Fallback: no grammar data available, just show plain text with blanks inline
    return `<div class="passage-text"><p>${renderPlainPassageWithBlanks(passageText, questions, userAnswers)}</p></div>`;
  }

  const markerByPosition = {}; // charOffset -> question
  questions.forEach(q => {
    // we don't have exact offsets per question here directly; matched via blank_positions at data level already baked into grammar text presence
  });

  let html = '<div class="passage-text">';
  grammarSentences.forEach((chunks, sIdx) => {
    const vKey = `${pk}-${sIdx}`;
    const vstate = getViewState(vKey);
    const translation = (translations && translations[sIdx]) || '';

    html += `<p class="sentence-block">`;
    html += renderChunksWithGaps(chunks, passageText, questions, userAnswers);
    html += ` <button class="speak-btn-inline" data-speak-sentence="${sIdx}" title="朗讀本句">🔊</button>`;
    if (chunks.some(c => c.role !== 'TOPIC')) {
      html += ` <button class="tree-toggle-inline" data-tree-toggle="${sIdx}" title="句子結構">🌳</button>`;
    }
    if (translation) {
      html += ` <button class="tree-toggle-inline" data-trans-toggle="${sIdx}" title="中文翻譯">中</button>`;
    }
    html += `</p>`;

    if (vstate.tree && chunks.some(c => c.role !== 'TOPIC')) {
      html += renderStructureTree(chunks);
    }
    if (vstate.translation && translation) {
      html += `<div class="sentence-translation">${escapeHtml(translation)}</div>`;
    }
  });
  html += '</div>';
  return html;
}

function renderChunksWithGaps(chunks, passageText, questions, userAnswers) {
  let html = '';
  let lastEnd = null;
  chunks.forEach(c => {
    if (lastEnd !== null && c.start > lastEnd) {
      html += escapeHtml(passageText.slice(lastEnd, c.start));
    }
    html += renderGramChunk(c, questions, userAnswers);
    lastEnd = c.end;
  });
  return html;
}

function renderGramChunk(chunk, questions, userAnswers) {
  const role = chunk.role || 'TOPIC';
  const text = chunk.text;
  const matched = questions.some(q => new RegExp('(^|[^\\w])' + escapeRegex(q.marker) + '($|[^\\w])').test(text));
  if (matched) {
    return renderTextWithBlankInline(text, questions, userAnswers, role);
  }
  const cls = role === 'TOPIC' ? 'gram-TOPIC' : 'gram-' + role;
  return `<span class="gram-chunk ${cls}">${escapeHtml(text)}</span>`;
}

// A chunk's text might be e.g. "are sent" (no blank) or contain a bare
// marker token like "q" / "1" / "0" embedded among words, e.g. "This 1 restaurant".
// We split on the exact marker token (word-boundary) and inject the blank widget.
function renderTextWithBlankInline(text, questions, userAnswers, role) {
  let result = '';
  let remaining = text;
  // find any marker token present as a whole "word" inside this chunk
  const found = questions.filter(q => new RegExp('(^|[^\\w])' + escapeRegex(q.marker) + '($|[^\\w])').test(text));
  if (!found.length) {
    const cls = role === 'TOPIC' ? 'gram-TOPIC' : 'gram-' + role;
    return `<span class="gram-chunk ${cls}">${escapeHtml(text)}</span>`;
  }
  found.forEach(q => {
    const re = new RegExp('(^|[^\\w])(' + escapeRegex(q.marker) + ')($|[^\\w])');
    const m = remaining.match(re);
    if (!m) return;
    const before = remaining.slice(0, m.index + m[1].length);
    const after = remaining.slice(m.index + m[1].length + m[2].length);
    const cls = role === 'TOPIC' ? 'gram-TOPIC' : 'gram-' + role;
    result += `<span class="gram-chunk ${cls}">${escapeHtml(before)}</span>`;
    result += renderBlankWidget(q, userAnswers);
    remaining = after;
  });
  const cls = role === 'TOPIC' ? 'gram-TOPIC' : 'gram-' + role;
  result += `<span class="gram-chunk ${cls}">${escapeHtml(remaining)}</span>`;
  return result;
}

function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\;]/g, '\\$&'); }

function renderBlankWidget(q, userAnswers) {
  const userLetter = userAnswers[q.marker];
  let cls = 'blank-widget blank-empty';
  let label = q.qnum_int || q.marker;
  if (userLetter) {
    const correct = userLetter === q.correct;
    cls = 'blank-widget ' + (correct ? 'blank-correct' : 'blank-wrong');
    label = userLetter;
  }
  return `<span class="${cls}" data-jump-question="${escapeAttr(q.marker)}">${escapeHtml(String(label))}</span>`;
}

function renderPlainPassageWithBlanks(passageText, questions, userAnswers) {
  let html = escapeHtml(passageText);
  questions.forEach(q => {
    const re = new RegExp('(^|[^\\w])(' + escapeRegex(q.marker) + ')($|[^\\w])');
    html = html.replace(re, (m, a, b, c) => a + renderBlankWidget(q, userAnswers) + c);
  });
  return html.replace(/\n/g, '<br><br>');
}

function renderStructureTree(chunks) {
  const legendRoles = [...new Set(chunks.map(c => c.role))].filter(r => r !== 'TOPIC');
  const legend = legendRoles.map(r => `
    <span class="gram-legend-item gram-${r}"><span class="gram-legend-dot" style="background:var(--role-${r})"></span>${ROLE_LABELS[r] || r}</span>
  `).join('');
  const nodes = chunks.filter(c => c.role !== 'TOPIC' || c.text.trim().length > 1).map(c => `
    <div class="tree-node">
      <div class="tree-node-text tree-node-text-${c.role}">${escapeHtml(c.text)}</div>
      <div class="tree-node-role tree-node-role-${c.role}">${c.role}</div>
    </div>
  `).join('');
  return `
    <div class="gram-legend">${legend}</div>
    <div class="sentence-tree-wrap"><div class="tree-row">${nodes}</div></div>
  `;
}

// ============================================================
// Question blocks — three shapes
// ============================================================

// A) Comprehensive-style: each question has its own A-D options inline.
function renderStandardQuestions(pk, questions, userAnswers) {
  const blocks = questions.map(q => {
    const userLetter = userAnswers[q.marker];
    const isAnswered = !!userLetter;
    const optionsHtml = q.options.map(([letter, text]) => {
      let cls = 'option-btn';
      if (isAnswered) {
        cls += ' option-disabled';
        if (letter === q.correct) cls += ' option-correct';
        else if (letter === userLetter) cls += ' option-wrong';
      }
      return `
        <button class="${cls}" data-answer-marker="${escapeAttr(q.marker)}" data-answer-letter="${letter}" ${isAnswered ? 'disabled' : ''}>
          <span class="option-letter">${letter}</span>
          <span class="option-text">${escapeHtml(text)}</span>
        </button>
      `;
    }).join('');

    let explainHtml = '';
    if (isAnswered) {
      const correct = userLetter === q.correct;
      explainHtml = `
        <div class="explain-block ${correct ? 'explain-correct' : 'explain-wrong'}">
          <p class="explain-verdict">${correct ? '✅ 答對了！' : '❌ 答錯了，正確答案是 ' + q.correct}</p>
          <p class="explain-text">${escapeHtml(q.explanation || '')}</p>
        </div>
      `;
    }

    return `
      <div class="question-block" id="qblock-${escapeAttr(q.marker)}" data-question-marker="${escapeAttr(q.marker)}">
        <p class="question-label">第 ${q.qnum_int || q.marker} 題 <span class="marker-tag">[${q.marker}]</span></p>
        <div class="options-row">${optionsHtml}</div>
        ${explainHtml}
      </div>
    `;
  }).join('');
  return `<div class="questions-stack">${blocks}</div>`;
}

// B) Vocab-fill: shared word bank (A-J) + list of blank markers, each
// click on a bank word applies it to the *next unanswered* blank... but
// more natural UX (and matching the reference): show each blank as its
// own question block where student picks from the *same shared* options.
function renderVocabBankAndQuestions(pk, item, questions, userAnswers) {
  const allOptions = item.options; // [[letter, text], ...]
  const usedLetters = new Set(Object.values(userAnswers));

  const bankHtml = `
    <div class="word-bank">
      <p class="word-bank-label">選項字庫</p>
      <div class="word-bank-grid">
        ${allOptions.map(([letter, text]) => `
          <div class="bank-item ${usedLetters.has(letter) ? 'bank-item-used' : ''}">
            <strong>${letter}</strong>${escapeHtml(text)}
          </div>
        `).join('')}
      </div>
    </div>
  `;

  const blocks = questions.map(q => {
    const userLetter = userAnswers[q.marker];
    const isAnswered = !!userLetter;
    const optionsHtml = allOptions.map(([letter, text]) => {
      let cls = 'option-btn';
      if (isAnswered) {
        cls += ' option-disabled';
        if (letter === q.correct) cls += ' option-correct';
        else if (letter === userLetter) cls += ' option-wrong';
      } else if (usedLetters.has(letter)) {
        cls += ' option-disabled';
      }
      return `
        <button class="${cls}" data-answer-marker="${escapeAttr(q.marker)}" data-answer-letter="${letter}" ${isAnswered || (!isAnswered && usedLetters.has(letter)) ? 'disabled' : ''}>
          <span class="option-letter">${letter}</span><span class="option-text">${escapeHtml(text)}</span>
        </button>
      `;
    }).join('');

    let explainHtml = '';
    if (isAnswered) {
      const correct = userLetter === q.correct;
      explainHtml = `
        <div class="explain-block ${correct ? 'explain-correct' : 'explain-wrong'}">
          <p class="explain-verdict">${correct ? '✅ 答對了！' : '❌ 答錯了，正確答案是 ' + q.correct}</p>
        </div>
      `;
    }
    return `
      <div class="question-block" data-question-marker="${escapeAttr(q.marker)}">
        <p class="question-label">空格 <span class="marker-tag">[${q.marker}]</span></p>
        <div class="options-row">${optionsHtml}</div>
        ${explainHtml}
      </div>
    `;
  }).join('');

  return bankHtml + `<div class="questions-stack" style="margin-top:16px;">${blocks}</div>`;
}

// C) Paragraph-structure: shared sentence options (A-D/E) inserted into blanks.
function renderParagraphOptionsAndQuestions(pk, item, questions, userAnswers) {
  const allOptions = item.options;
  const usedLetters = new Set(Object.values(userAnswers));

  const bankHtml = `
    <div class="ps-options-list">
      <p class="word-bank-label">候選句子</p>
      ${allOptions.map(([letter, text]) => `
        <div class="ps-option-item ${usedLetters.has(letter) ? 'ps-option-used' : ''}"><strong>${letter}</strong>${escapeHtml(text)}</div>
      `).join('')}
    </div>
  `;

  const blocks = questions.map(q => {
    const userLetter = userAnswers[q.marker];
    const isAnswered = !!userLetter;
    const optionsHtml = allOptions.map(([letter, text]) => {
      let cls = 'option-btn';
      if (isAnswered) {
        cls += ' option-disabled';
        if (letter === q.correct) cls += ' option-correct';
        else if (letter === userLetter) cls += ' option-wrong';
      }
      return `
        <button class="${cls}" data-answer-marker="${escapeAttr(q.marker)}" data-answer-letter="${letter}" ${isAnswered ? 'disabled' : ''}>
          <span class="option-letter">${letter}</span><span class="option-text">${escapeHtml(text)}</span>
        </button>
      `;
    }).join('');
    let explainHtml = '';
    if (isAnswered) {
      const correct = userLetter === q.correct;
      explainHtml = `<div class="explain-block ${correct ? 'explain-correct' : 'explain-wrong'}"><p class="explain-verdict">${correct ? '✅ 答對了！' : '❌ 答錯了，正確答案是 ' + q.correct}</p></div>`;
    }
    return `
      <div class="question-block" data-question-marker="${escapeAttr(q.marker)}">
        <p class="question-label">空格 <span class="marker-tag">[${q.marker}]</span></p>
        <div class="options-row">${optionsHtml}</div>
        ${explainHtml}
      </div>
    `;
  }).join('');

  return bankHtml + `<div class="questions-stack" style="margin-top:16px;">${blocks}</div>`;
}

// ============================================================
// Event binding for a rendered passage group
// ============================================================

// We use a single event delegation on #unitMain rather than binding
// to individual buttons — this avoids repeated-bind conflicts when
// multiple passages share the same querySelectorAll selectors.
let _delegationBound = false;

function bindPassageGroupEvents(zone, sectionKey, item, itemIdx) {
  // No-op: all real binding is done once via bindUnitMainDelegation
}

function rebindAfterRerender(zone, sectionKey) {
  // Re-attach delegation after DOM rebuild
  bindUnitMainDelegation(zone, sectionKey);
}

function bindUnitMainDelegation(zone, sectionKey) {
  const main = document.getElementById('unitMain');
  if (!main) return;

  // Remove old listener by cloning node (cleanest way to reset)
  const fresh = main.cloneNode(true);
  main.parentNode.replaceChild(fresh, main);

  const items = zone.data[sectionKey] || [];

  fresh.addEventListener('click', (e) => {
    const target = e.target;

    // ---- Answer button ----
    const ansBtn = target.closest('[data-answer-marker][data-answer-letter]');
    if (ansBtn && !ansBtn.disabled) {
      const block = ansBtn.closest('[data-question-marker]');
      if (!block) return;
      const marker = ansBtn.dataset.answerMarker;
      const letter = ansBtn.dataset.answerLetter;
      // Find which item owns this block via closest passage-group-columns
      const groupEl = ansBtn.closest('.passage-group');
      if (!groupEl) return;
      const groupIdx = Array.from(fresh.querySelectorAll('.passage-group')).indexOf(groupEl);
      const item = items[groupIdx];
      if (!item) return;
      const hasDual = !!(item.passage1 && item.passage2);
      // Determine suffix by which column the block is in
      const cols = groupEl.querySelectorAll('.passage-group-columns');
      let suffix = '0';
      if (hasDual) {
        const colIdx = [...cols].findIndex(col => col.contains(ansBtn));
        suffix = colIdx === 1 ? '2' : '1';
      }
      submitAnswer(zone, sectionKey, item, groupIdx, suffix, marker, letter);
      return;
    }

    // ---- Sentence speak button ----
    const speakBtn = target.closest('[data-speak-sentence]');
    if (speakBtn) {
      e.stopPropagation();
      const sIdx = parseInt(speakBtn.dataset.speakSentence, 10);
      const groupEl = speakBtn.closest('.passage-group');
      if (!groupEl) return;
      const groupIdx = Array.from(fresh.querySelectorAll('.passage-group')).indexOf(groupEl);
      const item = items[groupIdx];
      if (!item) return;
      const hasDual = !!(item.passage1 && item.passage2);
      let grammar;
      if (!hasDual) {
        grammar = item.passage_grammar;
      } else {
        // Determine which column the speak btn is in
        const cols = groupEl.querySelectorAll('.passage-group-columns');
        const colIdx = [...cols].findIndex(col => col.contains(speakBtn));
        grammar = colIdx === 1 ? item.passage2_grammar : item.passage1_grammar;
      }
      if (!grammar || !grammar[sIdx]) return;
      // Build clean spoken text: join chunk texts, collapse whitespace, remove bare number markers
      const raw = grammar[sIdx].map(c => c.text).join(' ').replace(/\s+/g, ' ').trim();
      const clean = raw.replace(/\b\d\b|\b[qwertyuiopasdfghjkl;]\b/g, '').replace(/\s{2,}/g, ' ').trim();
      speakWithEl(clean || raw, speakBtn);
      return;
    }

    // ---- Tree toggle ----
    const treeBtn = target.closest('[data-tree-toggle]');
    if (treeBtn) {
      e.stopPropagation();
      const sIdx = treeBtn.dataset.treeToggle;
      const groupEl = treeBtn.closest('.passage-group');
      if (!groupEl) return;
      const groupIdx = Array.from(fresh.querySelectorAll('.passage-group')).indexOf(groupEl);
      const item = items[groupIdx];
      if (!item) return;
      const hasDual = !!(item.passage1 && item.passage2);
      const pk = passageKey(zone.id, sectionKey, groupIdx) + '-' + (hasDual ? (groupEl.querySelectorAll('.passage-group-columns')[0].contains(treeBtn) ? '1' : '2') : '0');
      const vKey = `${pk}-${sIdx}`;
      const vstate = getViewState(vKey);
      vstate.tree = !vstate.tree;
      if (vstate.tree) { STATE.treeOpens = (STATE.treeOpens || 0) + 1; saveState(); checkNewBadges(); }
      renderSectionItems(zone, sectionKey);
      bindUnitMainDelegation(zone, sectionKey);
      return;
    }

    // ---- Translation toggle ----
    const transBtn = target.closest('[data-trans-toggle]');
    if (transBtn) {
      e.stopPropagation();
      const sIdx = transBtn.dataset.transToggle;
      const groupEl = transBtn.closest('.passage-group');
      if (!groupEl) return;
      const groupIdx = Array.from(fresh.querySelectorAll('.passage-group')).indexOf(groupEl);
      const item = items[groupIdx];
      if (!item) return;
      const hasDual = !!(item.passage1 && item.passage2);
      const pk = passageKey(zone.id, sectionKey, groupIdx) + '-' + (hasDual ? '0' : '0');
      const vKey = `${pk}-${sIdx}`;
      const vstate = getViewState(vKey);
      vstate.translation = !vstate.translation;
      renderSectionItems(zone, sectionKey);
      bindUnitMainDelegation(zone, sectionKey);
      return;
    }

    // ---- Blank widget jump ----
    const blankEl = target.closest('[data-jump-question]');
    if (blankEl) {
      const target2 = fresh.querySelector(`[id="qblock-${blankEl.dataset.jumpQuestion}"]`);
      if (target2) target2.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  });
}

// ============================================================
// Answer submission + XP/progress tracking
// ============================================================
function submitAnswer(zone, sectionKey, item, itemIdx, suffix, marker, letter) {
  const pk = passageKey(zone.id, sectionKey, itemIdx) + '-' + suffix;
  if (!STATE.passageProgress[pk]) {
    STATE.passageProgress[pk] = { answers: {}, correctCount: 0, completed: false };
  }
  const prog = STATE.passageProgress[pk];
  if (prog.answers[marker]) return; // already answered

  const allQuestions = (item.questions || []);
  const q = allQuestions.find(qq => qq.marker === marker);
  if (!q) return;

  prog.answers[marker] = letter;
  const correct = letter === q.correct;

  touchStreak();
  STATE.totalAnswered++;
  if (correct) {
    STATE.totalCorrect++;
    prog.correctCount = (prog.correctCount || 0) + 1;
    addXp(10);
  } else {
    addXp(2);
  }

  // check if this passage-block is now fully answered
  const blockQuestions = suffix === '0' ? allQuestions
    : suffix === '1' ? allQuestions.filter(qq => qq.qnum_int <= 5)
    : allQuestions.filter(qq => qq.qnum_int > 5);
  const allAnswered = blockQuestions.every(qq => prog.answers[qq.marker]);
  if (allAnswered && !prog.completed) {
    prog.completed = true;
    const allCorrect = blockQuestions.every(qq => prog.answers[qq.marker] === qq.correct);
    if (allCorrect) { STATE.perfectPassages = (STATE.perfectPassages || 0) + 1; addXp(20); }
  }

  saveState();
  const newBadges = checkNewBadges();
  renderTopbar();
  renderSectionItems(zone, sectionKey);
  rebindAfterRerender(zone, sectionKey);

  if (newBadges.length) {
    setTimeout(() => alert('🎉 解鎖新成就：' + newBadges.map(b => b.icon + ' ' + b.label).join('、')), 300);
  }
}

// ============================================================
// PROGRESS screen
// ============================================================
function renderProgressHtml() {
  const lv = levelFromXp(STATE.xp);
  const accuracy = STATE.totalAnswered ? Math.round(100 * STATE.totalCorrect / STATE.totalAnswered) : 0;
  const days = [];
  for (let i = 13; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    days.push({ label: d.getDate(), done: STATE.activeDates.includes(key) });
  }
  const badgeHtml = BADGES.map(b => {
    const earned = STATE.earnedBadges.includes(b.id);
    return `<div class="badge-item ${earned?'earned':''}"><div class="badge-circle">${earned?b.icon:'🔒'}</div><div class="badge-label">${b.label}</div></div>`;
  }).join('');

  const zoneCards = ZONES.map(zone => {
    const stats = computeZoneStats(zone);
    const pct = stats.totalQ ? Math.round(100*stats.doneQ/stats.totalQ) : 0;
    return `
      <div class="zone-progress-card">
        <div class="zone-progress-top"><span class="zone-progress-name">${zone.icon} ${zone.label} ${zone.title}</span><span class="zone-progress-pct">${pct}%</span></div>
        <div class="zone-progress-bar-track"><div class="zone-progress-bar-fill" style="width:${pct}%"></div></div>
      </div>
    `;
  }).join('');

  return `
    <div class="gami-screen">
      <div style="display:flex;justify-content:flex-end;margin-bottom:14px;">
        <button class="structure-toggle-btn" id="openReportBtn" style="padding:9px 18px;">📋 產生學習報告（給老師看）</button>
      </div>
      <div class="profile-card">
        <div class="profile-top">
          <div class="avatar-circle">${STATE.name[0]||'我'}</div>
          <div><div class="profile-name">${STATE.name}的學習主頁</div><div class="profile-level">Lv.${lv.level} · 距下一等級還差 ${xpForLevel(lv.level+1)-STATE.xp} XP</div></div>
        </div>
        <div class="xp-bar-track" style="background:rgba(255,255,255,0.18);margin-top:14px;"><div class="xp-bar-fill" style="width:${(lv.progress*100).toFixed(1)}%"></div></div>
        <div class="streak-row">
          <div class="streak-box"><div class="sb-num">🔥 ${STATE.streak}</div><div class="sb-label">連續天數</div></div>
          <div class="streak-box"><div class="sb-num">${STATE.totalAnswered}</div><div class="sb-label">累計答題</div></div>
          <div class="streak-box"><div class="sb-num">${accuracy}%</div><div class="sb-label">正確率</div></div>
        </div>
        <div class="calendar-strip">${days.map(d=>`<div class="cal-day ${d.done?'done':''}">${d.label}</div>`).join('')}</div>
      </div>
      <h2 class="gami-section-title">成就徽章</h2>
      <div class="badge-grid">${badgeHtml}</div>
      <h2 class="gami-section-title">各範圍完成度</h2>
      ${zoneCards}
    </div>
  `;
}

function openLearningReport() {

  const today = new Date();
  const dateStr = `${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日`;

    const stats = computeZoneStats(zone);
    const pct = stats.totalQ ? Math.round(100*stats.doneQ/stats.totalQ) : 0;

  const overlay = document.createElement('div');
  overlay.className = 'report-overlay';
  overlay.innerHTML = `
    <div class="report-card">
      <button class="report-close" id="reportCloseBtn">✕</button>
      <div class="report-header"><div class="report-app-name">📘 克漏字開外掛 · 學習報告</div><div class="report-date">${dateStr}</div></div>

        <div class="report-stat"><div class="rs-num">${STATE.streak}</div><div class="rs-label">連續天數</div></div>

        <div class="report-stat"><div class="rs-num">${accuracy}%</div><div class="rs-label">正確率</div></div>
